document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  html { scroll-behavior: smooth; }\n  body { background: #F4F6FB; }\n  .tip { position: relative; }\n  .tip .tip-icon {\n    display: inline-flex; align-items: center; justify-content: center;\n    width: 16px; height: 16px; border-radius: 9999px;\n    font-size: 10px; font-weight: 700; line-height: 1;\n    background: #DCE6F7; color: #1450A0; cursor: help; user-select: none;\n  }\n  .tip .tip-box {\n    position: absolute; z-index: 50; top: 130%; left: 0;\n    width: 250px; padding: 10px 12px; border-radius: 10px;\n    background: #0B1320; color: #E8EEF8; font-size: 11.5px; line-height: 1.45;\n    box-shadow: 0 12px 28px rgba(6,33,63,.28);\n    opacity: 0; visibility: hidden; transform: translateY(-4px);\n    transition: all .15s ease; pointer-events: none; font-weight: 400;\n  }\n  .tip:hover .tip-box { opacity: 1; visibility: visible; transform: translateY(0); }\n  .tip.tip-right .tip-box { left: auto; right: 0; }\n\n  .tab-btn.active { color: #0E3C73; }\n  .tab-btn.active .tab-underline { transform: scaleX(1); }\n  .tab-underline { transform: scaleX(0); transform-origin: left; transition: transform .25s ease; }\n\n  .funnel-bar { transition: width .9s cubic-bezier(.22,1,.36,1); }\n  .dropzone.drag { border-color:#1F6FE0; background:rgba(31,111,224,.08); }\n  ::-webkit-scrollbar { height: 8px; width: 8px; }\n  ::-webkit-scrollbar-thumb { background: #C7D3E6; border-radius: 8px; }\n<\u002Fstyle>\n<\u002Fhead>\n\n<body class=\"font-sans text-ink antialiased\">\n\n<!-- ====================== HEADER ====================== -->\n<header class=\"sticky top-0 z-40 bg-danone-900 text-white shadow-lg\">\n  <div class=\"max-w-[1400px] mx-auto px-6 py-4\">\n    <div class=\"flex flex-wrap items-center gap-4 justify-between\">\n      <div class=\"flex items-center gap-3\">\n        <div class=\"w-11 h-11 rounded-xl bg-white/10 ring-1 ring-white/20 flex items-center justify-center font-extrabold text-lg tracking-tight\">D<\u002Fdiv>\n        <div>\n          <h1 class=\"text-lg font-extrabold leading-tight\">Danone CAC · Painel Executivo<\u002Fh1>\n          <p class=\"text-[12px] text-danone-100/80 leading-tight\">Central de Atendimento ao Cliente · Processamento local de Eventtracks &amp; Tickets<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <button id=\"processBtn\" class=\"group relative inline-flex items-center gap-2 bg-danone-500 hover:bg-danone-400 active:scale-[.98] transition-all text-white font-bold text-sm rounded-lg px-5 py-2.5 shadow-[0_6px_18px_rgba(31,111,224,.45)] disabled:opacity-50 disabled:pointer-events-none\">\n        <svg id=\"processIcon\" class=\"w-4 h-4\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12a9 9 0 1 1-2.64-6.36\"><\u002Fpath><path d=\"M21 3v6h-6\"><\u002Fpath><\u002Fsvg>\n        <span id=\"processLabel\">Processar Dados<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- Fonte: pasta local -->\n    <div id=\"folderPanel\" class=\"mt-4 rounded-xl border-2 border-white/25 bg-white/5 px-4 py-3.5\">\n      <div class=\"flex flex-wrap items-center gap-3\">\n        <span class=\"w-9 h-9 rounded-lg bg-white/10 flex items-center justify-center shrink-0\">\n          <svg class=\"w-4 h-4\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fspan>\n        <div class=\"min-w-0 flex-1\">\n          <div class=\"text-[12.5px] font-bold leading-tight\">Pasta de dados <span class=\"text-danone-100/60 font-medium\">(eventtracks &amp; tickets)<\u002Fspan><\u002Fdiv>\n          <div id=\"folderInfo\" class=\"text-[11px] text-danone-100/70 truncate\">Conecte a pasta <b>bases<\u002Fb> uma vez — o painel lê todos os arquivos automaticamente, juntando os pedaços por data.<\u002Fdiv>\n        <\u002Fdiv>\n        <button id=\"connectFolderBtn\" class=\"inline-flex items-center gap-2 bg-white/10 hover:bg-white/20 ring-1 ring-white/25 transition-colors text-white font-bold text-[12.5px] rounded-lg px-4 py-2 shrink-0\">\n          <svg class=\"w-4 h-4\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z\"><\u002Fpath><\u002Fsvg>\n          Conectar pasta\n        <\u002Fbutton>\n        <button id=\"refreshFolderBtn\" class=\"hidden inline-flex items-center gap-2 bg-danone-500 hover:bg-danone-400 active:scale-[.98] transition-all text-white font-bold text-[12.5px] rounded-lg px-4 py-2 shrink-0 shadow-[0_4px_14px_rgba(31,111,224,.4)]\">\n          <svg class=\"w-4 h-4\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12a9 9 0 1 1-2.64-6.36\"><\u002Fpath><path d=\"M21 3v6h-6\"><\u002Fpath><\u002Fsvg>\n          Atualizar da pasta\n        <\u002Fbutton>\n        <button id=\"openTabBtn\" class=\"hidden inline-flex items-center gap-2 bg-white text-danone-900 hover:bg-danone-100 transition-colors font-bold text-[12.5px] rounded-lg px-4 py-2 shrink-0\">\n          <svg class=\"w-4 h-4\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M15 3h6v6\"><\u002Fpath><path d=\"M10 14L21 3\"><\u002Fpath><path d=\"M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6\"><\u002Fpath><\u002Fsvg>\n          Abrir em aba própria\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Upload zones (fallback manual) -->\n    <details id=\"manualWrap\" class=\"mt-3\">\n      <summary class=\"text-[11.5px] text-danone-100/70 cursor-pointer select-none hover:text-white inline-flex items-center gap-1.5 w-fit\">\n        <svg class=\"w-3.5 h-3.5\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M9 18l6-6-6-6\"><\u002Fpath><\u002Fsvg>\n        ou carregar arquivos manualmente\n      <\u002Fsummary>\n    <div class=\"mt-3 grid grid-cols-1 md:grid-cols-2 gap-3\">\n      <label id=\"dzEvents\" class=\"dropzone cursor-pointer rounded-xl border-2 border-dashed border-white/25 bg-white/5 hover:bg-white/10 transition-colors px-4 py-3 flex items-center gap-3\">\n        <span class=\"w-9 h-9 rounded-lg bg-white/10 flex items-center justify-center shrink-0\">\n          <svg class=\"w-4 h-4\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M3 3v18h18\"><\u002Fpath><path d=\"M7 16l4-6 3 4 5-8\"><\u002Fpath><\u002Fsvg>\n        <\u002Fspan>\n        <div class=\"min-w-0 flex-1\">\n          <div class=\"text-[12.5px] font-bold leading-tight\">Eventtracks <span class=\"text-danone-100/60 font-medium\">(jornada / comportamento)<\u002Fspan><\u002Fdiv>\n          <div id=\"evInfo\" class=\"text-[11px] text-danone-100/70 truncate\">Arraste o CSV/JSON aqui ou clique para selecionar<\u002Fdiv>\n        <\u002Fdiv>\n        <input id=\"fileEvents\" type=\"file\" accept=\".csv,.json,.txt\" class=\"hidden\">\n      <\u002Flabel>\n\n      <label id=\"dzTickets\" class=\"dropzone cursor-pointer rounded-xl border-2 border-dashed border-white/25 bg-white/5 hover:bg-white/10 transition-colors px-4 py-3 flex items-center gap-3\">\n        <span class=\"w-9 h-9 rounded-lg bg-white/10 flex items-center justify-center shrink-0\">\n          <svg class=\"w-4 h-4\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fspan>\n        <div class=\"min-w-0 flex-1\">\n          <div class=\"text-[12.5px] font-bold leading-tight\">Tickets <span class=\"text-danone-100/60 font-medium\">(atendimento humano / transbordo)<\u002Fspan><\u002Fdiv>\n          <div id=\"tkInfo\" class=\"text-[11px] text-danone-100/70 truncate\">Arraste o CSV/JSON aqui ou clique para selecionar<\u002Fdiv>\n        <\u002Fdiv>\n        <input id=\"fileTickets\" type=\"file\" accept=\".csv,.json,.txt\" class=\"hidden\">\n      <\u002Flabel>\n    <\u002Fdiv>\n    <\u002Fdetails>\n\n    <div id=\"statusBar\" class=\"mt-3 text-[12px] flex items-center gap-2 text-danone-100/80\">\n      <span id=\"statusDot\" class=\"w-2 h-2 rounded-full bg-slate-400\"><\u002Fspan>\n      <span id=\"statusText\">Carregue os dois arquivos e clique em “Processar Dados”.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <nav class=\"bg-white border-t border-danone-700/30\">\n    <div class=\"max-w-[1400px] mx-auto px-6 flex gap-1\">\n      <button data-tab=\"jornada\" class=\"tab-btn active relative px-5 py-3.5 text-sm font-bold text-slate-500 hover:text-danone-700 transition-colors\">\n        <span class=\"flex items-center gap-2\">\n          <svg class=\"w-4 h-4\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M3 3v18h18\"><\u002Fpath><path d=\"M7 16l4-6 3 4 5-8\"><\u002Fpath><\u002Fsvg>\n          Métricas de Jornada\n        <\u002Fspan>\n        <span class=\"tab-underline absolute left-0 right-0 bottom-0 h-[3px] bg-danone-500\"><\u002Fspan>\n      <\u002Fbutton>\n      <button data-tab=\"atendimento\" class=\"tab-btn relative px-5 py-3.5 text-sm font-bold text-slate-500 hover:text-danone-700 transition-colors\">\n        <span class=\"flex items-center gap-2\">\n          <svg class=\"w-4 h-4\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg>\n          Métricas de Atendimento\n        <\u002Fspan>\n        <span class=\"tab-underline absolute left-0 right-0 bottom-0 h-[3px] bg-danone-500\"><\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fnav>\n<\u002Fheader>\n\n<main class=\"max-w-[1400px] mx-auto px-6 py-7\">\n\n  <!-- Filtro de período -->\n  <div id=\"filterBar\" class=\"hidden mb-6 bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 px-5 py-4\">\n    <div class=\"flex flex-wrap items-center gap-x-5 gap-y-3\">\n      <div class=\"flex items-center gap-2\">\n        <svg class=\"w-4 h-4 text-danone-500\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><path d=\"M16 2v4M8 2v4M3 10h18\"><\u002Fpath><\u002Fsvg>\n        <span class=\"text-[11px] font-bold uppercase tracking-wider text-slate-400\">Período<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"flex items-center gap-2\">\n        <label class=\"text-[12px] text-slate-500 font-semibold\">De<\u002Flabel>\n        <input id=\"fltFrom\" type=\"date\" class=\"rounded-lg border border-slate-200 px-2.5 py-1.5 text-[13px] text-danone-900 tabular-nums focus:ring-2 focus:ring-danone-400 focus:border-danone-400 outline-none\">\n        <label class=\"text-[12px] text-slate-500 font-semibold\">até<\u002Flabel>\n        <input id=\"fltTo\" type=\"date\" class=\"rounded-lg border border-slate-200 px-2.5 py-1.5 text-[13px] text-danone-900 tabular-nums focus:ring-2 focus:ring-danone-400 focus:border-danone-400 outline-none\">\n      <\u002Fdiv>\n      <div class=\"flex items-center gap-1.5\">\n        <button data-preset=\"7\" class=\"preset text-[12px] font-bold text-slate-600 bg-slate-100 hover:bg-danone-100 hover:text-danone-700 transition-colors rounded-lg px-3 py-1.5\">7 dias<\u002Fbutton>\n        <button data-preset=\"30\" class=\"preset text-[12px] font-bold text-slate-600 bg-slate-100 hover:bg-danone-100 hover:text-danone-700 transition-colors rounded-lg px-3 py-1.5\">30 dias<\u002Fbutton>\n        <button id=\"fltReset\" class=\"text-[12px] font-bold text-slate-600 bg-slate-100 hover:bg-danone-100 hover:text-danone-700 transition-colors rounded-lg px-3 py-1.5\">Tudo<\u002Fbutton>\n      <\u002Fdiv>\n      <div id=\"filterSummary\" class=\"ml-auto text-[12px] text-slate-400\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Empty state -->\n  <div id=\"emptyState\" class=\"rounded-2xl border-2 border-dashed border-slate-200 bg-white py-16 px-6 text-center\">\n    <div class=\"w-14 h-14 mx-auto rounded-2xl bg-danone-100 flex items-center justify-center mb-4\">\n      <svg class=\"w-7 h-7 text-danone-600\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><path d=\"M14 2v6h6\"><\u002Fpath><path d=\"M9 13h6M9 17h6\"><\u002Fpath><\u002Fsvg>\n    <\u002Fdiv>\n    <h2 class=\"text-base font-extrabold text-danone-900\">Nenhum dado processado ainda<\u002Fh2>\n    <p class=\"text-[13px] text-slate-500 mt-1 max-w-md mx-auto\">Carregue o arquivo de <b>Eventtracks<\u002Fb> e o de <b>Tickets<\u002Fb> acima (CSV ou JSON) e clique em <b>Processar Dados<\u002Fb>. Todo o processamento acontece no seu navegador — nada é enviado para servidores.<\u002Fp>\n  <\u002Fdiv>\n\n  <div id=\"errorBanner\" class=\"hidden mb-6 rounded-xl border border-rose-200 bg-rose-50 px-5 py-4 text-rose-800\">\n    <div class=\"flex items-start gap-3\">\n      <svg class=\"w-5 h-5 mt-0.5 shrink-0\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 9v4\"><\u002Fpath><path d=\"M12 17h.01\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><\u002Fsvg>\n      <div><p class=\"font-bold text-sm\">Atenção no processamento<\u002Fp><p id=\"errorBannerMsg\" class=\"text-[13px] mt-0.5 text-rose-700/90\"><\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===================== ABA 1 — JORNADA ===================== -->\n  <section id=\"tab-jornada\" class=\"hidden\">\n    <div class=\"grid grid-cols-2 lg:grid-cols-4 gap-4 mb-7\" id=\"journeyKpis\"><\u002Fdiv>\n\n    <!-- Funil sequencial -->\n    <div class=\"bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-6 mb-7\">\n      <div class=\"flex items-center justify-between mb-1\">\n        <h2 class=\"text-base font-extrabold text-danone-900 flex items-center gap-2\">Volume por Etapa\n          <span class=\"tip\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">Cada etapa conta <b>contatos únicos por dia<\u002Fb> (um contato 1x por dia), igual aos blocos detalhados. O % é relativo à 1ª etapa (Perfil).<\u002Fspan><\u002Fspan>\n        <\u002Fh2>\n        <span class=\"text-[11px] text-slate-400 font-medium\">Perfil → Identificação → Pedidos → Transbordo<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"text-[12.5px] text-slate-500 mb-5\">Contatos únicos por dia em cada etapa da jornada.<\u002Fp>\n      <div id=\"funnel\" class=\"space-y-2.5\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Onde a jornada perde gente (funil por pessoas) -->\n    <div class=\"bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-6 mb-7\">\n      <div class=\"flex items-center justify-between mb-1\">\n        <h2 class=\"text-base font-extrabold text-danone-900 flex items-center gap-2\">Onde a jornada perde gente\n          <span class=\"tip\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">Funil por <b>contatos únicos por dia<\u002Fb>. Mostra quantos avançam de uma etapa à próxima e onde está a maior queda. Útil para achar o gargalo de identificação.<\u002Fspan><\u002Fspan>\n        <\u002Fh2>\n        <span class=\"text-[11px] text-slate-400 font-medium\">contatos únicos por dia<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"text-[12.5px] text-slate-500 mb-5\">Quantas pessoas seguem de uma etapa para a próxima — e quantas se perdem no caminho.<\u002Fp>\n      <div id=\"peopleFunnel\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Organograma + Coortes -->\n    <div class=\"grid grid-cols-1 xl:grid-cols-5 gap-6 mb-7\">\n      <div class=\"xl:col-span-3 bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-6\">\n        <div class=\"flex items-center justify-between mb-1\">\n          <h2 class=\"text-base font-extrabold text-danone-900 flex items-center gap-2\">Fluxo Ramificado\n            <span class=\"tip\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">Estrutura real da jornada em <b>contatos únicos por dia<\u002Fb> (um contato 1x por dia). Cada nó traz o total, o % do nó pai e o % da entrada.<\u002Fspan><\u002Fspan>\n          <\u002Fh2>\n        <\u002Fdiv>\n        <p class=\"text-[12.5px] text-slate-500 mb-4\">Do perfil inicial até a pesquisa, ramo a ramo.<\u002Fp>\n        <div id=\"flowTree\" class=\"overflow-x-auto pb-1\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"xl:col-span-2 bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-6\">\n        <div class=\"flex items-center justify-between mb-1\">\n          <h2 class=\"text-base font-extrabold text-danone-900 flex items-center gap-2\">Cortes de Retenção\n            <span class=\"tip tip-right\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">Cruzamento por usuário entre a tabela de Tickets (transbordo humano) e o evento de resposta à pesquisa (“pesquisa csat selecao”). Cálculo exato, não estimado.<\u002Fspan><\u002Fspan>\n          <\u002Fh2>\n        <\u002Fdiv>\n        <p class=\"text-[12.5px] text-slate-500 mb-4\">Distribuição real dos clientes.<\u002Fp>\n        <div class=\"grid grid-cols-2 gap-3\" id=\"scenarios\"><\u002Fdiv>\n        <div class=\"mt-4 pt-4 border-t border-slate-100\">\n          <div class=\"flex items-center gap-2 mb-2\">\n            <h3 class=\"text-[13px] font-extrabold text-danone-900\">Nota da Pesquisa (CSAT)<\u002Fh3>\n            <span class=\"tip\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">Como o cliente avaliou a experiência no evento “pesquisa csat selecao”: Fácil, Média ou Difícil. “Não respondeu” = pesquisa exibida mas encerrada por inatividade.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n          <div id=\"csatNotes\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Pesquisa CSAT + Conversões-chave -->\n    <div class=\"grid grid-cols-1 xl:grid-cols-2 gap-6 mb-7\">\n      <div class=\"bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-6\">\n        <h2 class=\"text-base font-extrabold text-danone-900 mb-1 flex items-center gap-2\">Pesquisa de Satisfação (CSAT)\n          <span class=\"tip\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">Funil da pesquisa: quantas foram exibidas (“pesquisa csat exibicao”) × quantas receberam nota real. A diferença é abandono por inatividade.<\u002Fspan><\u002Fspan>\n        <\u002Fh2>\n        <p class=\"text-[12.5px] text-slate-500 mb-4\">Quanto da pesquisa exibida vira resposta.<\u002Fp>\n        <div id=\"surveyCard\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-6\">\n        <h2 class=\"text-base font-extrabold text-danone-900 mb-1 flex items-center gap-2\">Conversões-chave\n          <span class=\"tip\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">Dois pontos críticos: a queda entre achar a loja e ver o pedido, e quanto do atendimento se resolve sem operador humano.<\u002Fspan><\u002Fspan>\n        <\u002Fh2>\n        <p class=\"text-[12.5px] text-slate-500 mb-4\">Drop-off e autoatendimento.<\u002Fp>\n        <div id=\"keyConversions\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Gráficos -->\n    <div class=\"grid grid-cols-1 xl:grid-cols-3 gap-6 mb-7\">\n      <div class=\"xl:col-span-2 bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-6\">\n        <h2 class=\"text-base font-extrabold text-danone-900 mb-1 flex items-center gap-2\">Identificação: Danoner × Cliente\n          <span class=\"tip\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">Os perfis e seus tipos de busca, separados: <b>Danoner<\u002Fb> (Código Danoner), <b>Cliente · Código da Loja<\u002Fb> e <b>Cliente · CNPJ<\u002Fb> — Código da Loja e CNPJ são consultas diferentes e contadas separadamente. Compara Exibição, Input e Erro.<\u002Fspan><\u002Fspan>\n        <\u002Fh2>\n        <p class=\"text-[12.5px] text-slate-500 mb-4\">Exibição, input e erro por tipo de consulta.<\u002Fp>\n        <div class=\"h-[300px]\"><canvas id=\"chartIdentificacao\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-6\">\n        <h2 class=\"text-base font-extrabold text-danone-900 mb-1 flex items-center gap-2\">Validação de Input por Consulta\n          <span class=\"tip\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">Inputs <b>válidos × inválidos<\u002Fb> de cada tipo de consulta (Código Danoner, Código da Loja, CNPJ), classificados pelo sufixo da Action da tracking de input (“… | válido / … | inválido”).<\u002Fspan><\u002Fspan>\n        <\u002Fh2>\n        <p class=\"text-[12.5px] text-slate-500 mb-4\">Válido × inválido em cada tipo de busca.<\u002Fp>\n        <div class=\"h-[300px]\"><canvas id=\"chartCnpj\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Atividade por hora -->\n    <div class=\"bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-6 mb-7\">\n      <h2 class=\"text-base font-extrabold text-danone-900 mb-1 flex items-center gap-2\">Atividade por Hora do Dia\n        <span class=\"tip\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">Volume de eventos do bot por hora do dia (todos os usuários, todo o período). Use para entender os picos de uso da jornada.<\u002Fspan><\u002Fspan>\n      <\u002Fh2>\n      <p class=\"text-[12.5px] text-slate-500 mb-4\">Picos de atividade ao longo do dia.<\u002Fp>\n      <div class=\"h-[260px]\"><canvas id=\"chartHour\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div id=\"journeyBlocks\" class=\"space-y-7\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== ABA 2 — ATENDIMENTO ===================== -->\n  <section id=\"tab-atendimento\" class=\"hidden\">\n    <div class=\"grid grid-cols-2 lg:grid-cols-4 gap-4 mb-7\" id=\"serviceKpis\"><\u002Fdiv>\n\n    <div class=\"grid grid-cols-2 lg:grid-cols-4 gap-4 mb-7\" id=\"timeKpis\"><\u002Fdiv>\n\n    <!-- SLA de fila + Autoatendimento -->\n    <div class=\"grid grid-cols-1 xl:grid-cols-3 gap-6 mb-7\">\n      <div class=\"xl:col-span-2 bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-6\">\n        <h2 class=\"text-base font-extrabold text-danone-900 mb-1 flex items-center gap-2\">SLA de Fila\n          <span class=\"tip\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">Distribuição do tempo de espera na fila (QueueTime) antes do atendente assumir o ticket. Expõe o gargalo: o atendente é rápido, mas o ticket fica parado.<\u002Fspan><\u002Fspan>\n        <\u002Fh2>\n        <p class=\"text-[12.5px] text-slate-500 mb-4\">Quanto tempo o cliente espera na fila até ser atendido.<\u002Fp>\n        <div id=\"slaCard\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-6 flex flex-col\">\n        <h2 class=\"text-base font-extrabold text-danone-900 mb-1 flex items-center gap-2\">Taxa de Autoatendimento\n          <span class=\"tip\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">Dos usuários que chegaram a ver pedidos, quantos resolveram sem gerar ticket humano (não aparecem na tabela de Tickets).<\u002Fspan><\u002Fspan>\n        <\u002Fh2>\n        <p class=\"text-[12.5px] text-slate-500 mb-4\">Resolução sem operador.<\u002Fp>\n        <div id=\"autoCard\" class=\"flex-1\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid grid-cols-1 xl:grid-cols-2 gap-6 mb-7\">\n      <div class=\"bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-6\">\n        <h2 class=\"text-base font-extrabold text-danone-900 mb-1 flex items-center gap-2\">Tickets por Atendente\n          <span class=\"tip\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">Volume de tickets fechados por cada agente humano (campo AgentName).<\u002Fspan><\u002Fspan>\n        <\u002Fh2>\n        <p class=\"text-[12.5px] text-slate-500 mb-4\">Carga de atendimento por operador.<\u002Fp>\n        <div class=\"h-[300px]\"><canvas id=\"chartAgents\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-6\">\n        <h2 class=\"text-base font-extrabold text-danone-900 mb-1 flex items-center gap-2\">Volume de Tickets por Dia\n          <span class=\"tip\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">Quantidade de tickets abertos por data (campo OpenDate).<\u002Fspan><\u002Fspan>\n        <\u002Fh2>\n        <p class=\"text-[12.5px] text-slate-500 mb-4\">Distribuição temporal das aberturas.<\u002Fp>\n        <div class=\"h-[300px]\"><canvas id=\"chartDaily\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid grid-cols-1 xl:grid-cols-3 gap-6 mb-7\">\n      <div class=\"bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-6\">\n        <h2 class=\"text-base font-extrabold text-danone-900 mb-1 flex items-center gap-2\">Status do Ticket\n          <span class=\"tip\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">Como os tickets foram encerrados (campo Status): resolvidos pelo atendente × transferidos.<\u002Fspan><\u002Fspan>\n        <\u002Fh2>\n        <p class=\"text-[12.5px] text-slate-500 mb-4\">Desfecho dos atendimentos.<\u002Fp>\n        <div class=\"h-[260px]\"><canvas id=\"chartStatus\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-6\">\n        <h2 class=\"text-base font-extrabold text-danone-900 mb-1 flex items-center gap-2\">Tipo de Usuário\n          <span class=\"tip\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">Distribuição entre Cliente e Funcionário Danone (campo tipoUsuario em CustomerExtras).<\u002Fspan><\u002Fspan>\n        <\u002Fh2>\n        <p class=\"text-[12.5px] text-slate-500 mb-4\">Perfil de quem chega ao humano.<\u002Fp>\n        <div class=\"h-[260px]\"><canvas id=\"chartTipo\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-6\">\n        <h2 class=\"text-base font-extrabold text-danone-900 mb-1 flex items-center gap-2\">Volumetria de Transbordo\n          <span class=\"tip\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">Eventos de transbordo no bot: início, transbordados, em atendimento, fora de horário e finalização.<\u002Fspan><\u002Fspan>\n        <\u002Fh2>\n        <p class=\"text-[12.5px] text-slate-500 mb-4\">Eventos da etapa de handoff (Eventtracks).<\u002Fp>\n        <div id=\"transbordoCards\" class=\"space-y-2\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Outliers de fila -->\n    <div class=\"bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-6 mb-7\">\n      <h2 class=\"text-base font-extrabold text-danone-900 mb-1 flex items-center gap-2\">Tickets que mais esperaram na fila\n        <span class=\"tip\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">Tickets ordenados pelo maior tempo de fila (QueueTime). São os casos que puxam a média para cima — candidatos a revisão de SLA/escala.<\u002Fspan><\u002Fspan>\n      <\u002Fh2>\n      <p class=\"text-[12.5px] text-slate-500 mb-4\">Os maiores tempos de espera do período.<\u002Fp>\n      <div id=\"outliersTable\" class=\"overflow-x-auto\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Diagnóstico -->\n  <section class=\"mt-8\">\n    <button id=\"debugToggle\" class=\"w-full flex items-center justify-between bg-white rounded-xl ring-1 ring-slate-100 shadow-sm px-5 py-3.5 text-left hover:bg-slate-50 transition-colors\">\n      <span class=\"flex items-center gap-2 text-[13.5px] font-bold text-slate-600\">\n        <svg class=\"w-4 h-4 text-danone-500\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4.3-4.3\"><\u002Fpath><\u002Fsvg>\n        Diagnóstico · categorias lidas dos arquivos\n      <\u002Fspan>\n      <svg id=\"debugChevron\" class=\"w-4 h-4 text-slate-400 transition-transform\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n    <div id=\"debugPanel\" class=\"hidden mt-3 bg-white rounded-xl ring-1 ring-slate-100 shadow-sm p-5\">\n      <p class=\"text-[12px] text-slate-500 mb-4\">Lista de todas as categorias de evento encontradas no arquivo de Eventtracks (ocorrências e usuários distintos) e o casamento do mapeamento da spec.<\u002Fp>\n      <div id=\"debugContent\" class=\"space-y-6 text-[12.5px]\"><p class=\"text-slate-400\">Processe os dados para popular o diagnóstico.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer class=\"mt-10 pb-6 text-center text-[11px] text-slate-400\">\n    Painel Danone CAC · processamento 100% local no navegador · nenhum dado é transmitido.\n  <\u002Ffooter>\n<\u002Fmain>\n\n<script>\n/* ============================================================================\n   MAPEAMENTO DE EVENTOS (categorias normalizadas) — 6 tópicos da spec\n   ============================================================================ */\nconst BLOCKS = [\n  { id:'perfil', title:'1 · Seleção de Perfil', desc:'Identificação inicial do tipo de perfil.', metrics:[\n    { id:'perfil_sel',  label:'Perfil de cliente',         cat:'perfil selecao',   desc:'Ocorrências do evento “perfil selecao”.' },\n    { id:'perfil_err',  label:'Perfil digitado errado',    cat:'perfil inesperado',desc:'Ocorrências do evento “perfil inesperado”.' },\n  ]},\n  { id:'danoner', title:'2 · Jornada Danoner', desc:'Identificação pelo Código Danoner.', metrics:[\n    { id:'dan_exib',  label:'Entrada no fluxo',        cat:'codigo danoner exibicao',  desc:'Evento “codigo danoner exibicao”.' },\n    { id:'dan_input', label:'Input efetuado',          cat:'codigo danoner input',     desc:'Evento “codigo danoner input”.' },\n    { id:'dan_err',   label:'Erro / input inesperado', cat:'codigo danoner inesperado',desc:'Evento “codigo danoner inesperado”.' },\n    { id:'dan_ok',    label:'Código de loja válido',   cat:'relatorio lojas validada', desc:'Evento “relatório lojas validada”.' },\n    { id:'dan_inval', label:'Código de loja inválido', cat:'loja nao encontrada exibicao', desc:'Evento “loja não encontrada exibicao”.' },\n  ]},\n  { id:'cli', title:'3 · Jornada Cliente (entrada)', desc:'Escolha inicial do caminho Cliente.', metrics:[\n    { id:'cli_sel', label:'Escolha inicial',              cat:'cliente selecao',   desc:'Evento “cliente seleção”.' },\n    { id:'cli_err', label:'Inputs inesperados na busca',  cat:'cliente inesperado',desc:'Evento “cliente inesperado”.' },\n  ]},\n  { id:'cliloja', title:'4 · Jornada Cliente · Código Loja', desc:'Ramificação por Código da Loja.', metrics:[\n    { id:'cl_exib',  label:'Entrada na ramificação', cat:'codigo cliente exibicao',  desc:'Evento “codigo cliente exibicao”.' },\n    { id:'cl_input', label:'Input efetuado',         cat:'codigo cliente input',     desc:'Evento “codigo cliente input”.' },\n    { id:'cl_err',   label:'Erro de código',         cat:'codigo cliente inesperado',desc:'Evento “codigo cliente inesperado”.' },\n    { id:'cl_naoenc',label:'Loja não encontrada',    cat:'loja nao encontrada exibicao', desc:'Evento “loja não encontrada exibicao”.' },\n    { id:'cl_conf',  label:'Loja confirmada',        cat:'confirmacao loja exibicao',desc:'Evento “confirmacao loja exibicao”.' },\n  ]},\n  { id:'clicnpj', title:'5 · Jornada Cliente · CNPJ', desc:'Ramificação por CNPJ.', metrics:[\n    { id:'cnpj_exib',   label:'Entrada na ramificação',   cat:'cnpj exibicao',     desc:'Evento “cnpj exibicao”.' },\n    { id:'cnpj_input',  label:'Input efetuado',           cat:'cnpj input',        desc:'Evento “cnpj input”.' },\n    { id:'cnpj_err',    label:'Erro de CNPJ',             cat:'cnpj inesperado',   desc:'Evento “cnpj inesperado”.' },\n    { id:'cnpj_busca',  label:'Buscas realizadas',        cat:'api buscar loja por cnpj', desc:'Evento “API buscar loja por cnpj”.' },\n    { id:'cnpj_achou',  label:'Loja encontrada por CNPJ', cat:'loja encontrada cnpj exibicao', desc:'Evento “loja encontrada cnpj exibicao”.' },\n    { id:'cnpj_nao',    label:'Loja não encontrada (CNPJ)', cat:'loja nao encontrada cnpj exibicao', desc:'Evento “loja não encontrada cnpj exibicao”.' },\n    { id:'cnpj_tent',   label:'Re-tentativa (exibição)',  cat:'tentativa cnpj exibicao', desc:'Evento “tentativa cnpj exibicao”.' },\n    { id:'cnpj_tent_in',label:'Input na re-tentativa',    cat:'tentativa cnpj input', desc:'Evento “tentativa cnpj input”.' },\n    { id:'cnpj_tent_er',label:'Erro na re-tentativa',     cat:'tentativa cnpj inesperado', desc:'Evento “tentativa cnpj inesperado”.' },\n  ]},\n  { id:'pedidos', title:'6 · Pedidos', desc:'Consulta de status e localização de pedidos.', metrics:[\n    { id:'ped_status', label:'Pedidos encontrados',          cat:'status pedidos exibicao', desc:'Evento “status pedidos exibicao”.' },\n    { id:'ped_mais',   label:'Paginação / ver mais',         cat:'mais pedidos exibicao',   desc:'Evento “mais pedidos exibicao”.' },\n    { id:'ped_nao',    label:'Pedido específico não encontrado', cat:'pedido nao encontrado exibicao', desc:'Evento “pedido não encontrado exibicao”.' },\n    { id:'ped_esp',    label:'Pedido específico encontrado', cat:'pedido especifico exibicao', desc:'Evento “pedido especifico exibicao”.' },\n  ]},\n];\n\n/* eventos de pesquisa / transbordo usados nos cruzamentos */\nconst CAT_SURVEY   = 'pesquisa csat selecao';\nconst CAT_PEDIDOS  = 'status pedidos exibicao';\n\n/* ============================================================================\n   ESTADO\n   ============================================================================ */\nconst RAW = { events:null, tickets:null };     // texto cru / registros das fontes\nconst MASTER = { events:[], tickets:[] };      // TODOS os registros lidos (sem filtro)\nconst FILTER = { from:null, to:null };         // recorte de data ativo (ISO yyyy-MM-dd)\nconst RANGE  = { min:null, max:null };          // extensão real dos dados\nconst EV  = { cats:{}, users:new Set(), rows:0 };  // cats[normCat] = {count, users:Set, actions:{}}\nconst TK  = { rows:[], byAgent:{}, byStatus:{}, byTipo:{}, byDay:{}, users:new Set(), times:{} };\nlet COHORT = { A:0, B:0, C:0, D:0 };\nlet CHARTS = {};\nlet loaded = false;\n\n/* ============================================================================\n   PARSING\n   ============================================================================ */\nfunction norm(s){ return String(s||'').toLowerCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').replace(/\\s+/g,' ').trim(); }\nfunction phone(id){ const m=String(id||'').match(/(\\d{6,})/); return m?m[1]:''; }\n\n// CSV parser tolerante: respeita aspas duplas (\"\" escapa \"), delimitador configurável, novas linhas\nfunction parseCSV(text, delim){\n  if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);\n  const rows=[]; let row=[], field='', q=false, i=0;\n  while(i<text.length){\n    const ch=text[i];\n    if(q){\n      if(ch==='\"'){ if(text[i+1]==='\"'){field+='\"';i+=2;continue;} q=false;i++;continue; }\n      field+=ch;i++;continue;\n    }\n    if(ch==='\"'){ q=true;i++;continue; }\n    if(ch===delim){ row.push(field);field='';i++;continue; }\n    if(ch==='\\r'){ i++;continue; }\n    if(ch==='\\n'){ row.push(field);rows.push(row);row=[];field='';i++;continue; }\n    field+=ch;i++;\n  }\n  if(field.length||row.length){ row.push(field);rows.push(row); }\n  return rows;\n}\n\nfunction detectDelim(line){\n  const counts={ '|':(line.split('|').length-1), ';':(line.split(';').length-1), ',':(line.split(',').length-1), '\\t':(line.split('\\t').length-1) };\n  return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];\n}\n\n// transforma texto (CSV ou JSON) em array de objetos {coluna: valor}\nfunction toRecords(text){\n  const trimmed = text.trim();\n  if(trimmed[0]==='[' || trimmed[0]==='{'){\n    try{\n      const j=JSON.parse(trimmed);\n      const arr=Array.isArray(j)?j:(j.items||j.data||j.resource&&j.resource.items||[]);\n      return Array.isArray(arr)?arr:[];\n    }catch(e){ /* cai p/ CSV */ }\n  }\n  const firstLine=trimmed.split('\\n')[0];\n  const delim=detectDelim(firstLine);\n  const rows=parseCSV(text, delim);\n  if(!rows.length) return [];\n  const header=rows[0].map(h=>h.trim());\n  const out=[];\n  for(let i=1;i<rows.length;i++){\n    const r=rows[i]; if(r.length===1 && r[0]==='') continue;\n    const o={}; header.forEach((h,j)=>{ o[h]=r[j]!==undefined?r[j]:''; });\n    out.push(o);\n  }\n  return out;\n}\n\n// junta vários arquivos do mesmo tipo (pedaços por data) num só array de registros\nfunction toRecordsMulti(texts){\n  const all=[];\n  for(const t of texts){ const r=toRecords(t); for(const x of r) all.push(x); }\n  return all;\n}\n\n// pega valor de campo ignorando caixa/acentos do nome da coluna\nfunction field(obj, names){\n  const keys=Object.keys(obj);\n  for(const want of names){\n    const wn=norm(want);\n    for(const k of keys){ if(norm(k)===wn) return obj[k]; }\n  }\n  return '';\n}\n\n/* ============================================================================\n   PROCESSAMENTO\n   ============================================================================ */\nfunction processEvents(text){\n  EV.cats={}; EV.users=new Set(); EV.rows=0; EV.byHour={};\n  EV.csat={ 'Fácil':0, 'Média':0, 'Difícil':0 }; EV.csatUsers=new Set();\n  EV.csatND={ 'Fácil':new Set(), 'Média':new Set(), 'Difícil':new Set() }; EV.csatNoRespND=new Set(); EV.csatNoResp=0;\n  const recs=Array.isArray(text)?text:toRecords(text);\n  EV.rows=recs.length;\n  for(const r of recs){\n    const cat=norm(field(r,['Category','categoria']));\n    const action=String(field(r,['Action','acao'])||'').trim()||'(sem ação)';\n    const u=phone(field(r,['UserId','user','usuario']));\n    const dt=String(field(r,['Data','data'])||'').trim();\n    const dh=String(field(r,['DataHora','datahora','data hora'])||'');\n    const day=dt || dh.split(' ')[0];\n    const ud = u ? (u+'|'+day) : null;\n    const hh=dh.split(' ')[1]; if(hh){ const hr=hh.slice(0,2); if(/^\\d\\d$/.test(hr)) EV.byHour[hr]=(EV.byHour[hr]||0)+1; }\n    if(!cat) continue;\n    if(u) EV.users.add(u);\n    if(!EV.cats[cat]) EV.cats[cat]={count:0, users:new Set(), userDays:new Set(), actions:{}, actionUD:{}};\n    const c=EV.cats[cat];\n    c.count++;\n    if(u){ c.users.add(u); c.userDays.add(ud); }\n    c.actions[action]=(c.actions[action]||0)+1;\n    if(!c.actionUD[action]) c.actionUD[action]=new Set();\n    if(ud) c.actionUD[action].add(ud);\n    if(cat===CAT_SURVEY){\n      const note=classifyNote(norm(action));\n      if(note){ if(ud) EV.csatND[note].add(ud); if(u) EV.csatUsers.add(u); }\n      else if(ud) EV.csatNoRespND.add(ud);\n    }\n  }\n  EV.csat={ 'Fácil':EV.csatND['Fácil'].size, 'Média':EV.csatND['Média'].size, 'Difícil':EV.csatND['Difícil'].size };\n  EV.csatNoResp=EV.csatNoRespND.size;\n}\n// nota da pesquisa csat: Fácil / Média / Difícil (demais ações = não respondeu)\nfunction classifyNote(a){\n  if(a.includes('facil')) return 'Fácil';\n  if(a.includes('dificil')) return 'Difícil';\n  if(a.includes('media')) return 'Média';\n  return null;\n}\n\n// duração \"Nd HH:MM:SS\" -> segundos (null se vazio)\nfunction durSec(s){\n  s=String(s||'').trim(); if(!s) return null;\n  const m=s.match(/(?:(\\d+)d\\s+)?(\\d+):(\\d+):(\\d+)/);\n  if(!m) return null;\n  return (+(m[1]||0))*86400 + (+m[2])*3600 + (+m[3])*60 + (+m[4]);\n}\nfunction fmtDur(sec){\n  if(sec==null||isNaN(sec)) return '—';\n  sec=Math.round(sec);\n  const d=Math.floor(sec/86400); sec-=d*86400;\n  const h=Math.floor(sec/3600); sec-=h*3600;\n  const m=Math.floor(sec/60); const s=sec-m*60;\n  if(d>0) return `${d}d ${h}h`;\n  if(h>0) return `${h}h ${m}m`;\n  if(m>0) return `${m}m ${s}s`;\n  return `${s}s`;\n}\nfunction avg(arr){ const v=arr.filter(x=>x!=null&&!isNaN(x)); return v.length? v.reduce((a,b)=>a+b,0)/v.length : null; }\n\nfunction processTickets(text){\n  Object.assign(TK,{ rows:[], byAgent:{}, byStatus:{}, byTipo:{}, byDay:{}, users:new Set(), times:{} });\n  const recs=Array.isArray(text)?text:toRecords(text);\n  const Q=[],F=[],O=[],Tt=[];\n  for(const r of recs){\n    const status=String(field(r,['Status'])||'').trim(); if(!status && Object.keys(r).length<3) continue;\n    const u=phone(field(r,['Original_CustomerIdentity','CustomerPhone','CustomerIdentity']));\n    const agent=String(field(r,['AgentName'])||'').trim()||'(sem nome)';\n    const open=String(field(r,['OpenDate'])||'').trim();\n    let tipo='Não informado';\n    try{ const ex=JSON.parse(field(r,['CustomerExtras'])||'{}'); if(ex.tipoUsuario) tipo=ex.tipoUsuario; }catch(e){}\n    const rec={ status, user:u, agent, open, tipo,\n      seq:String(field(r,['SequentialId'])||'').trim(), name:String(field(r,['CustomerName'])||'').trim(),\n      q:durSec(field(r,['QueueTime'])), f:durSec(field(r,['FirstResponseTime'])),\n      o:durSec(field(r,['OperationalTime'])), t:durSec(field(r,['TicketTotalTime'])) };\n    TK.rows.push(rec);\n    if(u) TK.users.add(u);\n    TK.byAgent[agent]=(TK.byAgent[agent]||0)+1;\n    if(status) TK.byStatus[status]=(TK.byStatus[status]||0)+1;\n    TK.byTipo[tipo]=(TK.byTipo[tipo]||0)+1;\n    const day=open.split(' ')[0]; if(day) TK.byDay[day]=(TK.byDay[day]||0)+1;\n    Q.push(rec.q); F.push(rec.f); O.push(rec.o); Tt.push(rec.t);\n  }\n  TK.times={ queue:avg(Q), first:avg(F), oper:avg(O), total:avg(Tt) };\n}\n\nfunction computeCohorts(){\n  const survey = EV.csatUsers || new Set();   // só quem deu nota real (Fácil/Média/Difícil)\n  const pedidos= EV.cats[CAT_PEDIDOS] ? EV.cats[CAT_PEDIDOS].users : new Set();\n  const tickets= TK.users;\n  const inter=(a,b)=>[...a].filter(x=>b.has(x)).length;\n  const diff =(a,b)=>[...a].filter(x=>!b.has(x)).length;\n  const auto = new Set([...pedidos].filter(x=>!tickets.has(x)));\n  COHORT = {\n    A: inter(tickets, survey),   // transbordo + respondeu\n    B: diff(tickets, survey),    // transbordo, sem pesquisa\n    C: inter(auto, survey),      // autoatendimento + respondeu\n    D: diff(auto, survey),       // autoatendimento, sem pesquisa\n    tickets: tickets.size, survey: survey.size, pedidos: pedidos.size, auto: auto.size,\n  };\n}\n\n/* ============================================================================\n   HELPERS DE LEITURA\n   ============================================================================ */\n// CONTAGEM PADRÃO: contatos únicos por data (um contato conta 1x por dia)\nfunction evCount(catNorm){ const c=EV.cats[catNorm]; return c?c.userDays.size:0; }\nfunction evOcc(catNorm){ const c=EV.cats[catNorm]; return c?c.count:0; }          // ocorrências (registros)\nfunction udSet(catNorm){ const c=EV.cats[catNorm]; return c?c.userDays:new Set(); }\nfunction unionUD(cats){ const s=new Set(); cats.forEach(c=>{ udSet(c).forEach(x=>s.add(x)); }); return s; }\n// classifica a tracking de input pelo sufixo da Action (\"<valor> | válido/inválido\") — contatos únicos/dia\nfunction validCounts(catNorm){\n  const c=EV.cats[catNorm]; const out={valido:0, invalido:0};\n  if(!c) return out;\n  for(const [act,set] of Object.entries(c.actionUD||{})){\n    const tail=norm(act.split('|').pop());\n    if(tail==='valido') out.valido+=set.size;\n    else if(tail==='invalido') out.invalido+=set.size;\n  }\n  return out;\n}\nfunction evUserCount(catNorm){ const c=EV.cats[catNorm]; return c?c.users.size:0; }\nfunction evUsers(catNorm){ const c=EV.cats[catNorm]; return c?c.users:new Set(); }\nfunction unionUsers(cats){ const s=new Set(); cats.forEach(c=>{ const set=evUsers(c); set.forEach(u=>s.add(u)); }); return s; }\nfunction fmt(n){ return (n||0).toLocaleString('pt-BR'); }\nfunction pct(part, whole){ return whole>0? Math.round((part/whole)*1000)/10 : 0; }\nfunction vById(id){ const m=BLOCKS.flatMap(b=>b.metrics).find(x=>x.id===id); return m? evCount(m.cat):0; }\n\n/* ============================================================================\n   RENDER\n   ============================================================================ */\nfunction renderAll(){\n  renderJourneyKpis(); renderFunnel(); renderPeopleFunnel(); renderFlowTree(); renderScenarios(); renderCsatNotes();\n  renderSurveyCard(); renderKeyConversions(); renderSLA(); renderAutoCard(); renderOutliers();\n  renderJourneyBlocks(); renderServiceKpis(); renderTimeKpis(); renderTransbordoCards();\n  renderCharts(); renderDebug();\n}\n\nconst COLORMAP = {\n  danone:['bg-danone-100','text-danone-700','#1F6FE0'],\n  indigo:['bg-indigo-50','text-indigo-700','#6366F1'],\n  emerald:['bg-emerald-50','text-emerald-700','#10B981'],\n  amber:['bg-amber-50','text-amber-700','#F59E0B'],\n  rose:['bg-rose-50','text-rose-700','#F43F5E'],\n  slate:['bg-slate-50','text-slate-600','#64748B'],\n};\nfunction kpiCard(k){\n  const c=COLORMAP[k.color]||COLORMAP.danone;\n  const val = loaded ? (k.text!=null? k.text : (fmt(k.value)+(k.suffix||''))) : '—';\n  return `\n  <div class=\"bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-5\">\n    <div class=\"flex items-start justify-between\">\n      <span class=\"text-[11px] font-bold uppercase tracking-wider text-slate-400\">${k.label}<\u002Fspan>\n      <span class=\"tip tip-right\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">${k.desc}<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"mt-2 text-3xl font-extrabold text-danone-900 tabular-nums\">${val}<\u002Fdiv>\n    <div class=\"mt-1 inline-flex items-center gap-1.5 text-[11.5px] font-semibold ${c[1]}\">\n      <span class=\"w-1.5 h-1.5 rounded-full\" style=\"background:${c[2]}\"><\u002Fspan>${k.sub}\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction renderJourneyKpis(){\n  const perfil = evCount('perfil exibicao');\n  const ident  = unionUD(['codigo danoner exibicao','cliente exibicao']).size;\n  const pedidos= evCount('status pedidos exibicao');\n  const c=EV.csat||{}; const notas=(c['Fácil']||0)+(c['Média']||0)+(c['Difícil']||0);\n  document.getElementById('journeyKpis').innerHTML=[\n    { label:'Perfil', value:perfil, sub:'contatos únicos/dia', color:'danone', desc:'Contatos únicos por dia no evento “perfil exibicao”.' },\n    { label:'Identificação', value:ident, sub:'Danoner + Cliente', color:'indigo', desc:'Contatos únicos por dia em “codigo danoner exibicao” ou “cliente selecao”.' },\n    { label:'Pedidos', value:pedidos, sub:'status pedidos exibicao', color:'emerald', desc:'Contatos únicos por dia no evento “status pedidos exibicao”.' },\n    { label:'Notas na pesquisa', value:notas, sub:'Fácil/Média/Difícil', color:'amber', desc:'Contatos únicos por dia que deram nota real (“pesquisa csat selecao”). Exclui inatividade.' },\n  ].map(kpiCard).join('');\n}\n\nfunction renderFunnel(){\n  const stages=[\n    { label:'1 · Perfil',          val:evCount('perfil exibicao'), color:'#0E3C73' },\n    { label:'2 · Identificação',   val:unionUD(['codigo danoner exibicao','cliente exibicao']).size, color:'#1450A0' },\n    { label:'3 · Pedidos',         val:evCount('status pedidos exibicao'), color:'#1F6FE0' },\n    { label:'4 · Transbordo',      val:evCount('transbordo inicial exibicao'), color:'#10B981' },\n  ];\n  const max  = Math.max(...stages.map(s=>s.val),1);\n  const base = stages[0].val||1;\n  document.getElementById('funnel').innerHTML = stages.map((s,i)=>{\n    const w = loaded? Math.max((s.val/max)*100, s.val>0?6:1.5):2;\n    const rel = i===0?null:pct(s.val, base);\n    return `\n    <div class=\"flex items-center gap-3\">\n      <div class=\"w-44 shrink-0 text-[13px] font-semibold text-slate-600\">${s.label}<\u002Fdiv>\n      <div class=\"flex-1 bg-slate-100 rounded-lg h-9 overflow-hidden relative\">\n        <div class=\"funnel-bar h-full rounded-lg flex items-center px-3\" style=\"width:${w}%;background:${s.color}\">\n          <span class=\"text-white text-[12.5px] font-bold tabular-nums drop-shadow\">${loaded?fmt(s.val):'—'}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"w-20 shrink-0 text-right text-[12.5px] font-bold ${i===0?'text-slate-400':'text-danone-600'} tabular-nums\">${loaded?(i===0?'base':rel+'%'):''}<\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\n/* funil por pessoas — onde a jornada perde gente */\nfunction renderPeopleFunnel(){\n  const el=document.getElementById('peopleFunnel'); if(!el) return;\n  if(!loaded){ el.innerHTML='<p class=\"text-slate-300 text-[12px]\">—<\u002Fp>'; return; }\n  const stages=[\n    { t:'Perfil selecionado', users:udSet('perfil exibicao'), note:'entraram na jornada' },\n    { t:'Identificação iniciada', users:unionUD(['codigo danoner exibicao','cliente exibicao']), note:'Danoner ou Cliente' },\n    { t:'Buscou loja (Código/CNPJ)', users:unionUD(['codigo cliente exibicao','cnpj exibicao']), note:'entrou para informar a loja' },\n    { t:'Achou loja válida', users:unionUD(['confirmacao loja exibicao','loja encontrada cnpj exibicao','relatorio lojas validada']), note:'loja confirmada' },\n    { t:'Viu pedidos', users:udSet('status pedidos exibicao'), note:'autoatendimento' },\n  ].map(s=>({ ...s, val:s.users.size }));\n  const top = stages[0].val || 1;\n  // maior queda absoluta\n  let worst=-1, worstIdx=-1;\n  for(let i=1;i<stages.length;i++){ const lost=stages[i-1].val-stages[i].val; if(lost>worst){ worst=lost; worstIdx=i; } }\n  el.innerHTML = stages.map((s,i)=>{\n    const prev = i>0?stages[i-1].val:null;\n    const conv = prev!=null ? pct(s.val,prev) : null;\n    const lost = prev!=null ? prev-s.val : 0;\n    const w = Math.max((s.val/top)*100, s.val>0?5:1);\n    const gap = i>0 && lost>0 ? `\n      <div class=\"flex items-center gap-2 py-1 pl-[200px]\">\n        <span class=\"text-[11px] font-bold ${i===worstIdx?'text-rose-600':'text-slate-400'} tabular-nums\">↓ −${fmt(lost)} pessoas (${(100-conv).toFixed(1)}% de queda)<\u002Fspan>\n        ${i===worstIdx?'<span class=\"text-[10px] font-bold text-white bg-rose-500 rounded px-1.5 py-0.5\">MAIOR GAP<\u002Fspan>':''}\n      <\u002Fdiv>`:'';\n    return `\n    ${gap}\n    <div class=\"flex items-center gap-3\">\n      <div class=\"w-[188px] shrink-0\">\n        <div class=\"text-[13px] font-bold text-slate-700 leading-tight\">${s.t}<\u002Fdiv>\n        <div class=\"text-[10.5px] text-slate-400\">${s.note}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"flex-1 bg-slate-100 rounded-lg h-10 overflow-hidden relative\">\n        <div class=\"funnel-bar h-full rounded-lg flex items-center px-3\" style=\"width:${w}%;background:${i===worstIdx?'#F43F5E':'#1F6FE0'}\">\n          <span class=\"text-white text-[13px] font-extrabold tabular-nums drop-shadow\">${fmt(s.val)}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"w-16 shrink-0 text-right text-[12px] font-bold ${conv==null?'text-slate-400':(conv<50?'text-rose-500':'text-emerald-600')} tabular-nums\">${conv==null?'base':conv+'%'}<\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\n/* organograma */\nconst FLOW_LINE='#CBD8EC';\nfunction fv(h){ return `<div style=\"width:2px;height:${h}px;background:${FLOW_LINE};margin:0 auto;\"><\u002Fdiv>`; }\nfunction fbus(){ return `<div style=\"height:0;border-top:2px solid ${FLOW_LINE};width:50%;margin:0 auto;\"><\u002Fdiv>`; }\nfunction fcol(inner){ return `<div style=\"width:50%;padding:0 8px;box-sizing:border-box;\">${inner}<\u002Fdiv>`; }\nfunction flowNode(o){\n  const val = loaded? fmt(o.value):'—';\n  const pPar = o.parent!=null && loaded ? pct(o.value,o.parent):null;\n  const pEnt = loaded? pct(o.value,o.base||1):null;\n  const chips = loaded? `\n    <div class=\"flex items-center gap-1 mt-1.5 flex-wrap\">\n      ${pPar!=null?`<span class=\"text-[9.5px] font-bold text-slate-500 bg-slate-100 rounded px-1.5 py-0.5 tabular-nums\">${pPar}% pai<\u002Fspan>`:''}\n      <span class=\"text-[9.5px] font-bold text-danone-700 bg-danone-100 rounded px-1.5 py-0.5 tabular-nums\">${pEnt}% entrada<\u002Fspan>\n    <\u002Fdiv>`:'';\n  return `\n    <div class=\"rounded-xl ring-1 ring-slate-200 bg-white shadow-sm px-3 py-2.5 text-left\" style=\"border-top:3px solid ${o.accent};\">\n      <div class=\"text-[12px] font-extrabold text-danone-900 leading-tight flex items-center gap-1.5\">${o.title}\n        ${o.tip?`<span class=\"tip\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">${o.tip}<\u002Fspan><\u002Fspan>`:''}\n      <\u002Fdiv>\n      ${o.subs?`<div class=\"text-[10px] text-slate-400 mt-0.5 leading-snug\">${o.subs}<\u002Fdiv>`:''}\n      <div class=\"text-xl font-extrabold text-danone-900 mt-1 tabular-nums\">${val}<\u002Fdiv>\n      ${chips}\n    <\u002Fdiv>`;\n}\nfunction renderFlowTree(){\n  const entryTotal = evCount('perfil exibicao');\n  const base = entryTotal||1;\n  const danoner = evCount('codigo danoner exibicao');\n  const cliente = evCount('cliente exibicao');\n  const cliLoja = evCount('codigo cliente exibicao');\n  const cliCnpj = evCount('cnpj exibicao');\n  const journeySum = unionUD(['codigo danoner exibicao','cliente exibicao']).size || 1;\n  const pedidos = evCount('status pedidos exibicao');\n\n  const entry=flowNode({ title:'Entrada · Perfil', subs:'perfil exibicao', value:entryTotal, parent:null, base, accent:'#06213F', tip:'Contatos únicos por dia no evento “perfil exibicao”. Base dos percentuais “% entrada”.' });\n  const nDan=flowNode({ title:'Jornada Danoner', subs:'codigo danoner exibicao', value:danoner, parent:entryTotal, base, accent:'#1450A0', tip:'Contatos únicos/dia em “codigo danoner exibicao”.' });\n  const nCli=flowNode({ title:'Jornada Cliente', subs:'cliente exibicao', value:cliente, parent:entryTotal, base, accent:'#1450A0', tip:'Contatos únicos/dia em “cliente exibicao”. Ramifica em Código da Loja e CNPJ.' });\n  const nLoja=flowNode({ title:'· Código da Loja', subs:'codigo cliente exibicao', value:cliLoja, parent:cliente, base, accent:'#4F90F0', tip:'Sub-ramo da Jornada Cliente: ocorrências de “codigo cliente exibicao”. “% pai” relativo à Jornada Cliente.' });\n  const nCnpj=flowNode({ title:'· CNPJ', subs:'cnpj exibicao', value:cliCnpj, parent:cliente, base, accent:'#4F90F0', tip:'Sub-ramo da Jornada Cliente: ocorrências de “cnpj exibicao”. “% pai” relativo à Jornada Cliente.' });\n  const nPed=flowNode({ title:'Módulo Pedidos', subs:'status pedidos exibicao', value:pedidos, parent:journeySum, base, accent:'#1F6FE0', tip:'Ocorrências (registros) de “status pedidos exibicao”. “% pai” relativo à soma das duas jornadas.' });\n\n  const grow=`<div style=\"flex:1;width:2px;background:${FLOW_LINE};margin:0 auto;min-height:14px;\"><\u002Fdiv>`;\n  const colF=(inner)=>`<div style=\"flex:1;padding:0 8px;box-sizing:border-box;display:flex;flex-direction:column;\">${inner}<\u002Fdiv>`;\n  document.getElementById('flowTree').innerHTML=`\n    <div style=\"min-width:720px;margin:0 auto;\">\n      <div style=\"max-width:360px;margin:0 auto;\">${entry}<\u002Fdiv>\n      ${fv(16)}${fbus()}\n      <div style=\"display:flex;align-items:stretch;\">\n        ${colF(`${fv(16)}${nDan}${grow}`)}\n        ${colF(`${fv(16)}${nCli}${fv(14)}${fbus()}<div style=\"display:flex;align-items:flex-start;\">${fcol(`${fv(14)}${nLoja}`)}${fcol(`${fv(14)}${nCnpj}`)}<\u002Fdiv>${grow}`)}\n      <\u002Fdiv>\n      ${fbus()}${fv(16)}\n      <div style=\"max-width:360px;margin:0 auto;\">${nPed}<\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"text-[11px] text-slate-400 mt-4 text-center\">Todos os valores são <b>contatos únicos por dia<\u002Fb> (um contato conta 1x por dia em cada tracking). O desfecho após pedidos — transbordo, autoatendimento e pesquisa — está no card <b>“Cortes de Retenção”<\u002Fb>, que cruza contatos entre os dois arquivos.<\u002Fp>`;\n}\n\nfunction renderScenarios(){\n  const total = (COHORT.A||0)+(COHORT.B||0)+(COHORT.C||0)+(COHORT.D||0);\n  const cards=[\n    { k:'A', t:'Jornada Completa', v:COHORT.A||0, c:'emerald', d:'Foram ao transbordo humano (Tickets) e deram nota na pesquisa de satisfação.' },\n    { k:'B', t:'Abandono no Transbordo', v:COHORT.B||0, c:'rose', d:'Presentes na tabela de Tickets, mas não deram nota na pesquisa (inatividade ou sem resposta).' },\n    { k:'C', t:'Autoatendimento c/ Pesquisa', v:COHORT.C||0, c:'danone', d:'Viram “status pedidos exibicao”, não geraram ticket e deram nota na pesquisa.' },\n    { k:'D', t:'Autoatendimento s/ Pesquisa', v:COHORT.D||0, c:'amber', d:'Viram “status pedidos exibicao”, não geraram ticket e não deram nota.' },\n  ];\n  document.getElementById('scenarios').innerHTML = cards.map(s=>{\n    const c=COLORMAP[s.c]; const share=loaded?pct(s.v,total):0;\n    return `\n    <div class=\"rounded-xl border border-slate-100 ${c[0]} p-4\">\n      <div class=\"flex items-start justify-between\">\n        <span class=\"w-8 h-8 rounded-lg flex items-center justify-center font-extrabold text-white text-sm\" style=\"background:${c[2]}\">${s.k}<\u002Fspan>\n        <span class=\"tip tip-right\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\">${s.d}<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"text-[12px] font-bold text-danone-900 leading-tight mt-2\">${s.t}<\u002Fdiv>\n      <div class=\"mt-1 flex items-end justify-between\">\n        <span class=\"text-2xl font-extrabold text-danone-900 tabular-nums\">${loaded?fmt(s.v):'—'}<\u002Fspan>\n        <span class=\"text-[12px] font-bold ${c[1]} tabular-nums\">${loaded?share+'%':''}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\nfunction renderCsatNotes(){\n  const el=document.getElementById('csatNotes'); if(!el) return;\n  const c=EV.csat||{}; const facil=c['Fácil']||0, media=c['Média']||0, dificil=c['Difícil']||0;\n  const noResp=EV.csatNoResp||0;\n  const respondeu=facil+media+dificil;\n  const segs=[\n    { t:'Fácil', v:facil, color:'#10B981' },\n    { t:'Média', v:media, color:'#F59E0B' },\n    { t:'Difícil', v:dificil, color:'#F43F5E' },\n  ];\n  const bar = respondeu>0 ? `<div class=\"flex h-2.5 rounded-full overflow-hidden bg-slate-100 mb-3\">${segs.map(s=>s.v>0?`<div style=\"width:${(s.v/respondeu)*100}%;background:${s.color}\"><\u002Fdiv>`:'').join('')}<\u002Fdiv>` : '';\n  el.innerHTML = loaded ? `\n    ${bar}\n    <div class=\"grid grid-cols-3 gap-2\">\n      ${segs.map(s=>`\n        <div class=\"rounded-lg bg-slate-50 px-2.5 py-2 text-center\">\n          <div class=\"text-[11px] font-semibold text-slate-500 flex items-center justify-center gap-1\"><span class=\"w-1.5 h-1.5 rounded-full\" style=\"background:${s.color}\"><\u002Fspan>${s.t}<\u002Fdiv>\n          <div class=\"text-lg font-extrabold text-danone-900 tabular-nums leading-tight mt-0.5\">${fmt(s.v)}<\u002Fdiv>\n          <div class=\"text-[10px] text-slate-400\">${pct(s.v,respondeu)}%<\u002Fdiv>\n        <\u002Fdiv>`).join('')}\n    <\u002Fdiv>\n    <div class=\"mt-2 flex items-center justify-between text-[11px]\">\n      <span class=\"text-slate-500\">Responderam (nota): <b class=\"text-danone-900\">${fmt(respondeu)}<\u002Fb><\u002Fspan>\n      <span class=\"text-slate-400\">Não respondeu (inatividade): <b class=\"text-slate-500\">${fmt(noResp)}<\u002Fb><\u002Fspan>\n    <\u002Fdiv>` : '<p class=\"text-slate-300 text-[12px]\">—<\u002Fp>';\n}\n\nfunction renderSurveyCard(){\n  const el=document.getElementById('surveyCard'); if(!el) return;\n  if(!loaded){ el.innerHTML='<p class=\"text-slate-300 text-[12px]\">—<\u002Fp>'; return; }\n  const exibida=evCount('pesquisa csat exibicao');\n  const c=EV.csat||{}; const respondeu=(c['Fácil']||0)+(c['Média']||0)+(c['Difícil']||0);\n  const abandono = exibida>0 ? Math.round((1-respondeu/exibida)*1000)/10 : 0;\n  const taxa = exibida>0 ? Math.round((respondeu/exibida)*1000)/10 : 0;\n  const stages=[\n    { t:'Pesquisa exibida', v:exibida, color:'#1450A0', cat:'pesquisa csat exibicao' },\n    { t:'Respondeu (nota real)', v:respondeu, color:'#10B981', cat:'Fácil/Média/Difícil' },\n  ];\n  const max=Math.max(exibida,1);\n  el.innerHTML=`\n    <div class=\"flex items-end gap-4 mb-4\">\n      <div>\n        <div class=\"text-4xl font-extrabold text-rose-500 tabular-nums leading-none\">${abandono}%<\u002Fdiv>\n        <div class=\"text-[11.5px] font-semibold text-slate-500 mt-1\">de abandono na pesquisa<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ml-auto text-right\">\n        <div class=\"text-2xl font-extrabold text-emerald-600 tabular-nums leading-none\">${taxa}%<\u002Fdiv>\n        <div class=\"text-[11px] text-slate-400 mt-1\">taxa de resposta<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    ${stages.map(s=>`\n      <div class=\"mb-2\">\n        <div class=\"flex items-center justify-between text-[12px] mb-1\"><span class=\"font-semibold text-slate-600\">${s.t}<\u002Fspan><span class=\"font-extrabold text-danone-900 tabular-nums\">${fmt(s.v)}<\u002Fspan><\u002Fdiv>\n        <div class=\"h-7 bg-slate-100 rounded-lg overflow-hidden\"><div class=\"h-full rounded-lg\" style=\"width:${Math.max((s.v/max)*100,s.v>0?6:1)}%;background:${s.color}\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>`).join('')}\n    <p class=\"text-[11px] text-slate-400 mt-2\">Diferença = exibições encerradas por inatividade (${fmt(EV.csatNoResp||0)} contatos únicos/dia).<\u002Fp>`;\n}\n\nfunction renderKeyConversions(){\n  const el=document.getElementById('keyConversions'); if(!el) return;\n  if(!loaded){ el.innerHTML='<p class=\"text-slate-300 text-[12px]\">—<\u002Fp>'; return; }\n  const achouLoja=unionUD(['confirmacao loja exibicao','loja encontrada cnpj exibicao']).size;\n  const viuPedido=evCount('status pedidos exibicao');\n  const conv = achouLoja>0 ? Math.round((viuPedido/achouLoja)*1000)/10 : 0;\n  const drop = achouLoja>0 ? Math.round((1-viuPedido/achouLoja)*1000)/10 : 0;\n  const autoRate = (COHORT.pedidos||0)>0 ? Math.round((COHORT.auto/COHORT.pedidos)*1000)/10 : 0;\n  el.innerHTML=`\n    <div class=\"rounded-xl bg-slate-50 p-4 mb-3\">\n      <div class=\"flex items-center justify-between mb-2\">\n        <span class=\"text-[12.5px] font-bold text-danone-900\">Achou loja → viu pedido<\u002Fspan>\n        <span class=\"text-[11px] font-bold text-rose-500 tabular-nums\">−${drop}% drop-off<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"flex items-center gap-2 text-[12px]\">\n        <span class=\"text-slate-500\">Achou loja <b class=\"text-danone-900 tabular-nums\">${fmt(achouLoja)}<\u002Fb><\u002Fspan>\n        <svg class=\"w-4 h-4 text-slate-300\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 12h14M13 6l6 6-6 6\"/><\u002Fsvg>\n        <span class=\"text-slate-500\">Viu pedido <b class=\"text-danone-900 tabular-nums\">${fmt(viuPedido)}<\u002Fb><\u002Fspan>\n        <span class=\"ml-auto text-[11px] font-bold text-emerald-600 tabular-nums\">${conv}% seguem<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"mt-2 h-2 bg-white rounded-full overflow-hidden\"><div class=\"h-full bg-emerald-500 rounded-full\" style=\"width:${conv}%\"><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"rounded-xl bg-emerald-50 p-4\">\n      <div class=\"flex items-end justify-between\">\n        <div>\n          <div class=\"text-[12.5px] font-bold text-danone-900\">Autoatendimento<\u002Fdiv>\n          <div class=\"text-[11px] text-slate-500 mt-0.5\">${fmt(COHORT.auto||0)} de ${fmt(COHORT.pedidos||0)} que viram pedido não geraram ticket<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"text-3xl font-extrabold text-emerald-600 tabular-nums leading-none\">${autoRate}%<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n}\n\nfunction renderSLA(){\n  const el=document.getElementById('slaCard'); if(!el) return;\n  if(!loaded){ el.innerHTML='<p class=\"text-slate-300 text-[12px]\">—<\u002Fp>'; return; }\n  const qs=TK.rows.map(r=>r.q).filter(x=>x!=null);\n  const buckets=[\n    { t:'≤ 30 min', test:s=>s<=1800, color:'#10B981' },\n    { t:'30 min – 2 h', test:s=>s>1800&&s<=7200, color:'#84CC16' },\n    { t:'2 h – 1 dia', test:s=>s>7200&&s<=86400, color:'#F59E0B' },\n    { t:'> 1 dia', test:s=>s>86400, color:'#F43F5E' },\n  ].map(b=>({ ...b, n:qs.filter(b.test).length }));\n  const total=qs.length||1;\n  el.innerHTML=`\n    <div class=\"flex h-3 rounded-full overflow-hidden bg-slate-100 mb-4\">\n      ${buckets.map(b=>b.n>0?`<div style=\"width:${(b.n/total)*100}%;background:${b.color}\" title=\"${b.t}\"><\u002Fdiv>`:'').join('')}\n    <\u002Fdiv>\n    <div class=\"grid grid-cols-2 sm:grid-cols-4 gap-3\">\n      ${buckets.map(b=>`\n        <div class=\"rounded-lg bg-slate-50 px-3 py-2.5\">\n          <div class=\"text-[11px] font-semibold text-slate-500 flex items-center gap-1.5\"><span class=\"w-2 h-2 rounded-full\" style=\"background:${b.color}\"><\u002Fspan>${b.t}<\u002Fdiv>\n          <div class=\"text-xl font-extrabold text-danone-900 tabular-nums mt-1\">${fmt(b.n)}<\u002Fdiv>\n          <div class=\"text-[10.5px] text-slate-400\">${pct(b.n,total)}%<\u002Fdiv>\n        <\u002Fdiv>`).join('')}\n    <\u002Fdiv>\n    <p class=\"text-[11px] text-slate-400 mt-3\">Base: ${fmt(total)} tickets com tempo de fila informado.<\u002Fp>`;\n}\n\nfunction renderAutoCard(){\n  const el=document.getElementById('autoCard'); if(!el) return;\n  if(!loaded){ el.innerHTML='<p class=\"text-slate-300 text-[12px]\">—<\u002Fp>'; return; }\n  const rate=(COHORT.pedidos||0)>0 ? Math.round((COHORT.auto/COHORT.pedidos)*1000)/10 : 0;\n  el.innerHTML=`\n    <div class=\"flex flex-col items-center justify-center h-full text-center py-2\">\n      <div class=\"text-5xl font-extrabold text-emerald-600 tabular-nums leading-none\">${rate}%<\u002Fdiv>\n      <div class=\"text-[12px] text-slate-500 mt-2\">${fmt(COHORT.auto||0)} de ${fmt(COHORT.pedidos||0)} resolveram sem operador<\u002Fdiv>\n      <div class=\"mt-3 w-full h-2 bg-slate-100 rounded-full overflow-hidden\"><div class=\"h-full bg-emerald-500 rounded-full\" style=\"width:${rate}%\"><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>`;\n}\n\nfunction renderOutliers(){\n  const el=document.getElementById('outliersTable'); if(!el) return;\n  if(!loaded){ el.innerHTML='<p class=\"text-slate-300 text-[12px]\">—<\u002Fp>'; return; }\n  const rows=TK.rows.filter(r=>r.q!=null).sort((a,b)=>b.q-a.q).slice(0,8);\n  if(!rows.length){ el.innerHTML='<p class=\"text-slate-400 text-[12px]\">Sem tickets com tempo de fila informado.<\u002Fp>'; return; }\n  el.innerHTML=`\n    <table class=\"w-full text-[12.5px] min-w-[560px]\">\n      <thead><tr class=\"text-[10.5px] uppercase tracking-wider text-slate-400 text-left border-b border-slate-100\">\n        <th class=\"py-2 pr-3 font-bold\">#<\u002Fth><th class=\"py-2 pr-3 font-bold\">Cliente<\u002Fth><th class=\"py-2 pr-3 font-bold\">Atendente<\u002Fth>\n        <th class=\"py-2 pr-3 font-bold text-right\">Tempo na fila<\u002Fth><th class=\"py-2 pr-3 font-bold\">Aberto em<\u002Fth><th class=\"py-2 font-bold\">Status<\u002Fth>\n      <\u002Ftr><\u002Fthead>\n      <tbody>\n        ${rows.map(r=>`\n        <tr class=\"border-b border-slate-50 hover:bg-slate-50\">\n          <td class=\"py-2 pr-3 font-mono text-slate-400\">${r.seq||'—'}<\u002Ftd>\n          <td class=\"py-2 pr-3 font-semibold text-slate-700\">${r.name||r.user||'—'}<\u002Ftd>\n          <td class=\"py-2 pr-3 text-slate-500\">${r.agent||'—'}<\u002Ftd>\n          <td class=\"py-2 pr-3 text-right font-extrabold tabular-nums ${r.q>86400?'text-rose-500':'text-danone-900'}\">${fmtDur(r.q)}<\u002Ftd>\n          <td class=\"py-2 pr-3 text-slate-500 tabular-nums\">${(r.open||'').split(' ')[0]||'—'}<\u002Ftd>\n          <td class=\"py-2\"><span class=\"text-[11px] font-semibold px-2 py-0.5 rounded-md ${r.status==='Transferred'?'bg-amber-100 text-amber-700':'bg-emerald-100 text-emerald-700'}\">${r.status||'—'}<\u002Fspan><\u002Ftd>\n        <\u002Ftr>`).join('')}\n      <\u002Ftbody>\n    <\u002Ftable>`;\n}\n\nfunction renderJourneyBlocks(){\n  document.getElementById('journeyBlocks').innerHTML = BLOCKS.map(block=>{\n    const rows = block.metrics.map(m=>{\n      const count=evCount(m.cat), occ=evOcc(m.cat);\n      const found = !!EV.cats[m.cat];\n      return `\n      <div class=\"flex items-center justify-between gap-3 py-2.5 px-3 rounded-lg hover:bg-slate-50 transition-colors\">\n        <div class=\"min-w-0\">\n          <div class=\"text-[13px] font-semibold text-slate-700 flex items-center gap-1.5\">${m.label}\n            <span class=\"tip\"><span class=\"tip-icon\">?<\u002Fspan><span class=\"tip-box\"><b>${m.cat}<\u002Fb><br>${m.desc}<br><span style=\"opacity:.6\">${loaded?(occ+' ocorrências (registros)'):''}<\u002Fspan><\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"text-[10.5px] text-slate-400 font-mono truncate\">${m.cat}<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"text-right shrink-0\">\n          ${loaded && !found\n            ? `<span class=\"text-[11px] text-slate-400 font-semibold\">ausente no arquivo<\u002Fspan>`\n            : `<span class=\"text-lg font-extrabold text-danone-900 tabular-nums\">${loaded?fmt(count):'—'}<\u002Fspan>${loaded?`<span class=\"block text-[10px] text-slate-400\">${fmt(occ)} ocorrências<\u002Fspan>`:''}`}\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n    }).join('');\n    return `\n    <div class=\"bg-white rounded-2xl shadow-sm ring-1 ring-slate-100 p-6\">\n      <div class=\"flex items-baseline justify-between mb-1\">\n        <h3 class=\"text-[15px] font-extrabold text-danone-900\">${block.title}<\u002Fh3>\n        <span class=\"text-[11px] text-slate-400\">${block.metrics.length} eventos<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"text-[12px] text-slate-500 mb-3\">${block.desc}<\u002Fp>\n      <div class=\"divide-y divide-slate-50\">${rows}<\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\n/* ABA 2 */\nfunction renderServiceKpis(){\n  const total=TK.rows.length;\n  const transf=TK.byStatus['Transferred']||0;\n  const closed=TK.byStatus['ClosedAttendant']||0;\n  document.getElementById('serviceKpis').innerHTML=[\n    { label:'Tickets', value:total, sub:'Total no período', color:'danone', desc:'Total de linhas (tickets) na tabela de atendimento.' },\n    { label:'Clientes únicos', value:TK.users.size, sub:'Atendidos por humano', color:'indigo', desc:'Identidades distintas que passaram pelo transbordo.' },\n    { label:'Resolvidos', value:closed, sub:'ClosedAttendant', color:'emerald', desc:'Tickets encerrados pelo próprio atendente.' },\n    { label:'Transferidos', value:transf, sub:'Transferred', color:'amber', desc:'Tickets repassados para outra fila/atendente.' },\n  ].map(kpiCard).join('');\n}\nfunction renderTimeKpis(){\n  const t=TK.times||{};\n  document.getElementById('timeKpis').innerHTML=[\n    { label:'Tempo médio na fila', text:fmtDur(t.queue), sub:'QueueTime', color:'slate', desc:'Tempo médio aguardando na fila antes do atendente assumir.' },\n    { label:'1ª resposta (média)', text:fmtDur(t.first), sub:'FirstResponseTime', color:'danone', desc:'Tempo médio até a primeira resposta do atendente.' },\n    { label:'Tempo operacional', text:fmtDur(t.oper), sub:'OperationalTime', color:'indigo', desc:'Tempo médio de trabalho efetivo no ticket.' },\n    { label:'Duração total média', text:fmtDur(t.total), sub:'TicketTotalTime', color:'emerald', desc:'Tempo médio total do ticket, da abertura ao fechamento.' },\n  ].map(kpiCard).join('');\n}\nfunction renderTransbordoCards(){\n  const items=[\n    { t:'Transbordo iniciado', cat:'transbordo inicial exibicao', c:'danone' },\n    { t:'Atend. transbordados', cat:'atendimentos transbordados exibicao', c:'indigo' },\n    { t:'Em atendimento', cat:'transbordo atendimento exibicao', c:'emerald' },\n    { t:'Fora de horário', cat:'transbordo
