 fora horario exibicao', c:'amber' },\n    { t:'Fim do atendimento', cat:'fim atendimento exibicao', c:'rose' },\n    { t:'Finalizado no chatbot', cat:'atendimentos finalizados no chatbot exibicao', c:'slate' },\n  ];\n  document.getElementById('transbordoCards').innerHTML = items.map(s=>{\n    const c=COLORMAP[s.c];\n    return `\n    <div class=\"flex items-center justify-between gap-2 rounded-lg ${c[0]} px-3 py-2\">\n      <span class=\"text-[12px] font-semibold text-slate-700\">${s.t}<\u002Fspan>\n      <span class=\"text-[15px] font-extrabold text-danone-900 tabular-nums\">${loaded?fmt(evCount(s.cat)):'—'}<\u002Fspan>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\n/* CHARTS */\nfunction makeChart(id, config){\n  if(CHARTS[id]) CHARTS[id].destroy();\n  const el=document.getElementById(id); if(!el) return;\n  CHARTS[id]=new Chart(el.getContext('2d'), config);\n}\nconst GRID={ color:'#EEF2F8' };\nconst BASEOPTS={ responsive:true, maintainAspectRatio:false,\n  plugins:{ legend:{ labels:{ font:{family:'Inter',size:12}, color:'#475569', usePointStyle:true, pointStyleWidth:8 } } } };\n\nfunction renderCharts(){\n  if(!loaded) return;\n  // Danoner (Cód. Danoner) e os dois tipos de busca do perfil Cliente, separados: Código da Loja × CNPJ\n  makeChart('chartIdentificacao',{ type:'bar',\n    data:{ labels:['Exibição','Input','Erro'], datasets:[\n      { label:'Danoner · Cód. Danoner', backgroundColor:'#0E3C73', borderRadius:6, data:[evCount('codigo danoner exibicao'),evCount('codigo danoner input'),evCount('codigo danoner inesperado')] },\n      { label:'Cliente · Código da Loja', backgroundColor:'#1F6FE0', borderRadius:6, data:[evCount('codigo cliente exibicao'),evCount('codigo cliente input'),evCount('codigo cliente inesperado')] },\n      { label:'Cliente · CNPJ', backgroundColor:'#4F90F0', borderRadius:6, data:[evCount('cnpj exibicao'),evCount('cnpj input'),evCount('cnpj inesperado')] },\n    ]},\n    options:{ ...BASEOPTS, scales:{ x:{ grid:{display:false}, ticks:{color:'#64748B'} }, y:{ grid:GRID, beginAtZero:true, ticks:{color:'#94A3B8'} } } } });\n\n  // Validação do input por tipo de consulta (sufixo válido/inválido na Action)\n  const vDan=validCounts('codigo danoner input');\n  const vLoja=validCounts('codigo cliente input');\n  const vCnpj=validCounts('cnpj input');\n  makeChart('chartCnpj',{ type:'bar',\n    data:{ labels:['Código Danoner','Código da Loja','CNPJ'], datasets:[\n      { label:'Válido', backgroundColor:'#10B981', borderRadius:6, data:[vDan.valido, vLoja.valido, vCnpj.valido] },\n      { label:'Inválido', backgroundColor:'#F43F5E', borderRadius:6, data:[vDan.invalido, vLoja.invalido, vCnpj.invalido] },\n    ]},\n    options:{ ...BASEOPTS, plugins:{ ...BASEOPTS.plugins, legend:{ position:'bottom', labels:BASEOPTS.plugins.legend.labels } },\n      scales:{ x:{ grid:{display:false}, ticks:{color:'#64748B', font:{size:11}} }, y:{ grid:GRID, beginAtZero:true, ticks:{color:'#94A3B8', precision:0} } } } });\n\n  // agentes\n  const ag=Object.entries(TK.byAgent).sort((a,b)=>b[1]-a[1]);\n  makeChart('chartAgents',{ type:'bar',\n    data:{ labels:ag.map(a=>a[0]), datasets:[{ label:'Tickets', backgroundColor:'#1450A0', borderRadius:6, data:ag.map(a=>a[1]) }] },\n    options:{ ...BASEOPTS, indexAxis:'y', plugins:{ ...BASEOPTS.plugins, legend:{display:false} }, scales:{ x:{ grid:GRID, beginAtZero:true, ticks:{color:'#94A3B8'} }, y:{ grid:{display:false}, ticks:{color:'#475569', font:{size:11}} } } } });\n\n  // diário\n  const days=Object.entries(TK.byDay).sort((a,b)=>{ const pa=a[0].split('/').reverse().join(''); const pb=b[0].split('/').reverse().join(''); return pa<pb?-1:1; });\n  makeChart('chartDaily',{ type:'line',\n    data:{ labels:days.map(d=>d[0].slice(0,5)), datasets:[{ label:'Tickets', data:days.map(d=>d[1]), borderColor:'#1F6FE0', backgroundColor:'rgba(31,111,224,.12)', fill:true, tension:.35, pointRadius:3, pointBackgroundColor:'#1F6FE0' }] },\n    options:{ ...BASEOPTS, plugins:{ ...BASEOPTS.plugins, legend:{display:false} }, scales:{ x:{ grid:{display:false}, ticks:{color:'#64748B', maxRotation:0, font:{size:10}} }, y:{ grid:GRID, beginAtZero:true, ticks:{color:'#94A3B8', precision:0} } } } });\n\n  // status\n  const st=Object.entries(TK.byStatus);\n  makeChart('chartStatus',{ type:'doughnut',\n    data:{ labels:st.map(s=>s[0]), datasets:[{ data:st.map(s=>s[1]), backgroundColor:['#10B981','#F59E0B','#1F6FE0','#F43F5E','#6366F1'], borderWidth:0 }] },\n    options:{ ...BASEOPTS, cutout:'62%', plugins:{ ...BASEOPTS.plugins, legend:{ position:'bottom', labels:BASEOPTS.plugins.legend.labels } } } });\n\n  // tipo usuario\n  const tp=Object.entries(TK.byTipo);\n  makeChart('chartTipo',{ type:'doughnut',\n    data:{ labels:tp.map(s=>s[0]), datasets:[{ data:tp.map(s=>s[1]), backgroundColor:['#1450A0','#4F90F0','#94A3B8','#F59E0B'], borderWidth:0 }] },\n    options:{ ...BASEOPTS, cutout:'62%', plugins:{ ...BASEOPTS.plugins, legend:{ position:'bottom', labels:BASEOPTS.plugins.legend.labels } } } });\n\n  // atividade por hora do dia\n  const hours=[]; for(let i=0;i<24;i++){ const k=String(i).padStart(2,'0'); if((EV.byHour||{})[k]) hours.push(k); }\n  const hLabels = hours.length? hours : Object.keys(EV.byHour||{}).sort();\n  const peak = Math.max(...hLabels.map(h=>EV.byHour[h]||0), 1);\n  makeChart('chartHour',{ type:'bar',\n    data:{ labels:hLabels.map(h=>h+'h'), datasets:[{ label:'Eventos', data:hLabels.map(h=>EV.byHour[h]||0),\n      backgroundColor:hLabels.map(h=>(EV.byHour[h]||0)>=peak*0.8?'#1450A0':'#9DBDF0'), borderRadius:5 }] },\n    options:{ ...BASEOPTS, plugins:{ ...BASEOPTS.plugins, legend:{display:false} },\n      scales:{ x:{ grid:{display:false}, ticks:{color:'#64748B', font:{size:10}} }, y:{ grid:GRID, beginAtZero:true, ticks:{color:'#94A3B8'} } } } });\n}\n\n/* DEBUG */\nfunction renderDebug(){\n  const cats=Object.entries(EV.cats).map(([cat,d])=>({cat,count:d.count,users:d.users.size,actions:d.actions})).sort((a,b)=>b.count-a.count);\n  const mapped=BLOCKS.flatMap(b=>b.metrics);\n  const catRows = cats.length? cats.map(c=>{\n    const acts=Object.entries(c.actions).sort((a,b)=>b[1]-a[1]).slice(0,6)\n      .map(([a,n])=>`<span class=\"inline-flex items-center gap-1 bg-slate-100 rounded-md px-2 py-0.5 text-[11px] text-slate-600\"><b class=\"text-slate-800\">${a}<\u002Fb>: ${fmt(n)}<\u002Fspan>`).join(' ');\n    return `<div class=\"py-2 border-b border-slate-50\">\n      <div class=\"flex items-center justify-between gap-3\">\n        <code class=\"text-[12px] font-bold text-danone-700\">${c.cat}<\u002Fcode>\n        <span class=\"text-[12px] font-extrabold text-danone-900 tabular-nums\">${fmt(c.count)} <span class=\"text-slate-400 font-medium\">· ${fmt(c.users)} usr<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"mt-1 flex flex-wrap gap-1\">${acts}<\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('') : '<p class=\"text-slate-400\">Nenhuma categoria lida.<\u002Fp>';\n  const matchRows = mapped.map(m=>{\n    const ok=!!EV.cats[m.cat];\n    return `<div class=\"flex items-center justify-between gap-3 py-1.5 border-b border-slate-50\">\n      <code class=\"text-[11.5px] text-slate-500 truncate\">${m.cat}<\u002Fcode>\n      <span class=\"shrink-0 text-[11px] ${ok?'text-emerald-600':'text-rose-500'} font-semibold\">${ok?'casado · '+fmt(evCount(m.cat)):'ausente'}<\u002Fspan>\n    <\u002Fdiv>`;\n  }).join('');\n  document.getElementById('debugContent').innerHTML=`\n    <div class=\"grid grid-cols-1 lg:grid-cols-2 gap-5\">\n      <div><p class=\"text-[11px] uppercase tracking-wider font-bold text-slate-400 mb-1\">Categorias no arquivo (${cats.length})<\u002Fp><div class=\"max-h-96 overflow-auto pr-2\">${catRows}<\u002Fdiv><\u002Fdiv>\n      <div><p class=\"text-[11px] uppercase tracking-wider font-bold text-slate-400 mb-1\">Mapeamento da spec → casamento<\u002Fp><div class=\"max-h-96 overflow-auto pr-2\">${matchRows}<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>`;\n}\n\n/* ============================================================================\n   UI / FLUXO\n   ============================================================================ */\nfunction setStatus(kind,text){\n  const map={ ok:'bg-emerald-400', loading:'bg-danone-400 animate-pulse', warn:'bg-amber-400', error:'bg-rose-400', idle:'bg-slate-400' };\n  document.getElementById('statusDot').className='w-2 h-2 rounded-full '+(map[kind]||map.idle);\n  document.getElementById('statusText').textContent=text;\n}\nfunction setBusy(b){\n  const btn=document.getElementById('processBtn');\n  btn.disabled=b;\n  document.getElementById('processIcon').classList.toggle('animate-spin',b);\n  document.getElementById('processLabel').textContent=b?'Processando…':'Processar Dados';\n}\nfunction showError(msg){ document.getElementById('errorBanner').classList.remove('hidden'); document.getElementById('errorBannerMsg').textContent=msg; }\nfunction hideError(){ document.getElementById('errorBanner').classList.add('hidden'); }\nfunction updateProcessBtn(){ document.getElementById('processBtn').disabled = !(RAW.events && RAW.tickets); }\n\nfunction readFileInput(file, slot, infoId){\n  const reader=new FileReader();\n  reader.onload=e=>{\n    RAW[slot]=e.target.result;\n    const sizeKb=(file.size/1024).toFixed(0);\n    document.getElementById(infoId).innerHTML=`<b class=\"text-white\">${file.name}<\u002Fb> · ${sizeKb} KB`;\n    updateProcessBtn();\n    setStatus('idle', RAW.events&&RAW.tickets?'Pronto para processar. Clique em “Processar Dados”.':'Carregue o outro arquivo para continuar.');\n  };\n  reader.readAsText(file);\n}\n\nfunction processData(){\n  if(!RAW.events || !RAW.tickets){ setStatus('warn','Carregue os dois arquivos primeiro.'); return; }\n  setBusy(true); hideError();\n  setTimeout(()=>{\n    try{\n      MASTER.events  = Array.isArray(RAW.events)?  RAW.events  : toRecords(RAW.events);\n      MASTER.tickets = Array.isArray(RAW.tickets)? RAW.tickets : toRecords(RAW.tickets);\n      if(MASTER.events.length===0 || MASTER.tickets.length===0){\n        showError('Eventtracks: '+MASTER.events.length+' registros · Tickets: '+MASTER.tickets.length+' registros. Verifique se os arquivos estão corretos (CSV separado por “|” ou “;”, ou JSON).');\n      }\n      computeRange();\n      applyFilters(true);   // reset: começa no período completo\n    }catch(err){\n      setStatus('error','Erro ao processar: '+err.message);\n      showError('Falha no processamento: '+err.message);\n    }\n    setBusy(false);\n  }, 30);\n}\n\n// chave de data comparável (yyyy-MM-dd) por registro\nfunction recDateKey(r, type){\n  if(type==='events'){\n    const s=String(field(r,['Data','DataHora','data','datahora'])||'').trim();\n    return s.slice(0,10);\n  }\n  const s=String(field(r,['OpenDate','StorageDate'])||'').trim();\n  const m=s.match(/(\\d{2})\\/(\\d{2})\\/(\\d{4})/);\n  if(m) return m[3]+'-'+m[2]+'-'+m[1];\n  const iso=s.match(/(\\d{4})-(\\d{2})-(\\d{2})/);\n  return iso? iso[0] : '';\n}\n\nfunction computeRange(){\n  let min=null,max=null;\n  const scan=(recs,type)=>{ for(const r of recs){ const k=recDateKey(r,type); if(!k||k.length!==10) continue; if(min===null||k<min)min=k; if(max===null||k>max)max=k; } };\n  scan(MASTER.events,'events'); scan(MASTER.tickets,'tickets');\n  RANGE.min=min; RANGE.max=max;\n}\n\nfunction filterByDate(recs, type){\n  if(!FILTER.from && !FILTER.to) return recs;\n  return recs.filter(r=>{\n    const k=recDateKey(r,type); if(!k) return true;\n    if(FILTER.from && k<FILTER.from) return false;\n    if(FILTER.to   && k>FILTER.to)   return false;\n    return true;\n  });\n}\n\nfunction applyFilters(reset){\n  if(reset){ FILTER.from=null; FILTER.to=null; }\n  processEvents(filterByDate(MASTER.events,'events'));\n  processTickets(filterByDate(MASTER.tickets,'tickets'));\n  computeCohorts();\n  loaded=true;\n  document.getElementById('emptyState').classList.add('hidden');\n  document.getElementById('filterBar').classList.remove('hidden');\n  document.getElementById('tab-jornada').classList.toggle('hidden', !document.querySelector('.tab-btn[data-tab=\"jornada\"]').classList.contains('active'));\n  document.getElementById('tab-atendimento').classList.toggle('hidden', !document.querySelector('.tab-btn[data-tab=\"atendimento\"]').classList.contains('active'));\n  renderAll();\n  renderFilterBar();\n  const filtered = !!(FILTER.from||FILTER.to);\n  const missing=BLOCKS.flatMap(b=>b.metrics).filter(m=>!EV.cats[m.cat]).map(m=>m.cat);\n  if(EV.rows===0 && TK.rows.length===0){\n    setStatus('warn', filtered?'Nenhum registro no período selecionado.':'Algum arquivo não pôde ser lido.');\n  } else if(missing.length && !filtered){\n    setStatus('warn', `Processado · Eventtracks ${fmt(EV.rows)} reg / ${EV.users.size} usuários · Tickets ${TK.rows.length}`);\n    showError(`Eventos do mapeamento ausentes neste arquivo (mostrados como “ausente”): ${missing.slice(0,6).join('; ')}${missing.length>6?'…':''}.`);\n  } else {\n    setStatus('ok', `Processado · Eventtracks ${fmt(EV.rows)} reg / ${EV.users.size} usuários · Tickets ${TK.rows.length}${filtered?' · período filtrado':''} · ${nowTime()}`);\n  }\n}\n\nfunction renderFilterBar(){\n  const from=document.getElementById('fltFrom'), to=document.getElementById('fltTo');\n  if(!from||!to) return;\n  if(RANGE.min){ from.min=RANGE.min; from.max=RANGE.max; to.min=RANGE.min; to.max=RANGE.max; }\n  from.value = FILTER.from || RANGE.min || '';\n  to.value   = FILTER.to   || RANGE.max || '';\n  const sum=document.getElementById('filterSummary');\n  if(sum){\n    const span = (FILTER.from||FILTER.to) ? 'período filtrado' : 'período completo';\n    sum.innerHTML = `<b class=\"text-danone-900\">${fmt(EV.rows)}<\u002Fb> eventos · <b class=\"text-danone-900\">${fmt(TK.rows.length)}<\u002Fb> tickets <span class=\"text-slate-300\">·<\u002Fspan> ${span}`;\n  }\n}\n\nfunction switchTab(name){\n  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===name));\n  document.getElementById('tab-jornada').classList.toggle('hidden', name!=='jornada' || !loaded);\n  document.getElementById('tab-atendimento').classList.toggle('hidden', name!=='atendimento' || !loaded);\n  if(loaded) setTimeout(renderCharts,30);\n}\nfunction nowTime(){ return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }\n\n/* ============================================================================\n   FONTE: PASTA LOCAL (File System Access API) + cache do handle em IndexedDB\n   ============================================================================ */\nconst FSA_OK = 'showDirectoryPicker' in window;\nlet dirHandle = null;\n\nfunction idb(){ return new Promise((res,rej)=>{ const r=indexedDB.open('danone-cac',1); r.onupgradeneeded=()=>r.result.createObjectStore('kv'); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }\nasync function idbSet(k,v){ const db=await idb(); return new Promise((res,rej)=>{ const tx=db.transaction('kv','readwrite'); tx.objectStore('kv').put(v,k); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }\nasync function idbGet(k){ const db=await idb(); return new Promise((res,rej)=>{ const tx=db.transaction('kv','readonly'); const rq=tx.objectStore('kv').get(k); rq.onsuccess=()=>res(rq.result); rq.onerror=()=>rej(rq.error); }); }\n\nasync function ensurePermission(handle){\n  const opts={ mode:'read' };\n  if((await handle.queryPermission(opts))==='granted') return true;\n  if((await handle.requestPermission(opts))==='granted') return true;\n  return false;\n}\n\nfunction showRefreshUI(){\n  const c=document.getElementById('connectFolderBtn'); const r=document.getElementById('refreshFolderBtn');\n  if(c) c.classList.add('hidden'); if(r) r.classList.remove('hidden');\n}\n\nasync function pickDirectory(){\n  try{\n    dirHandle = await window.showDirectoryPicker({ id:'danone-bases', mode:'read' });\n    await idbSet('dirHandle', dirHandle);\n    showRefreshUI();\n    await refreshFromDir();\n  }catch(e){\n    if(e && e.name==='AbortError') return;\n    const msg=String(e&&e.message||e);\n    if(e && (e.name==='SecurityError' || /sub frames|cross origin/i.test(msg))){\n      setStatus('warn','Abra o link em uma aba própria do navegador para conectar a pasta.');\n      showError('O navegador bloqueia a seleção de pasta quando a página está embutida (preview/iframe). Abra o link público diretamente numa aba do Chrome ou Edge e clique em “Conectar pasta” — ou use o atalho “Abrir em aba própria”.');\n      const ab=document.getElementById('openTabBtn'); if(ab) ab.classList.remove('hidden');\n    } else {\n      setStatus('error','Não foi possível abrir a pasta: '+msg);\n    }\n  }\n}\n\nasync function loadFromDirectory(dh){\n  const evTexts=[], tkTexts=[]; let evN=0, tkN=0;\n  for await (const entry of dh.values()){\n    if(entry.kind!=='file') continue;\n    const n=entry.name.toLowerCase();\n    if(!/\\.(csv|json|txt|tsv)$/.test(n)) continue;\n    const isEv=n.includes('eventtrack');\n    const isTk=n.includes('ticket');\n    if(!isEv && !isTk) continue;\n    const file=await entry.getFile();\n    const text=await file.text();\n    if(isEv){ evTexts.push(text); evN++; } else { tkTexts.push(text); tkN++; }\n  }\n  RAW.events  = evTexts.length? toRecordsMulti(evTexts) : null;\n  RAW.tickets = tkTexts.length? toRecordsMulti(tkTexts) : null;\n  const fi=document.getElementById('folderInfo');\n  if(fi) fi.innerHTML=`<b class=\"text-white\">${dh.name}<\u002Fb> · ${evN} eventtracks · ${tkN} tickets lidos`;\n  return { evN, tkN };\n}\n\nasync function refreshFromDir(){\n  if(!dirHandle) return;\n  setBusy(true); hideError(); setStatus('loading','Lendo arquivos da pasta…');\n  try{\n    if(!(await ensurePermission(dirHandle))){ setBusy(false); setStatus('warn','Permissão de leitura da pasta negada.'); return; }\n    const { evN, tkN } = await loadFromDirectory(dirHandle);\n    if(!evN && !tkN){\n      setBusy(false);\n      setStatus('warn','Nenhum arquivo com “eventtracks” ou “tickets” no nome foi encontrado.');\n      showError('A pasta foi lida, mas não há arquivos cujo nome contenha “eventtracks” ou “tickets” (.csv/.json/.txt).');\n      return;\n    }\n    updateProcessBtn();\n    processData();\n  }catch(e){ setBusy(false); setStatus('error','Erro ao ler a pasta: '+e.message); }\n}\n\n/* ============================================================================\n   INIT\n   ============================================================================ */\n(async function init(){\n  try{const [evR,tkR]=await Promise.all([fetch('_events.csv'),fetch('_tickets.csv')]);if(evR.ok&&tkR.ok){RAW.events=await evR.text();RAW.tickets=await tkR.text();const fp=document.getElementById('folderPanel');if(fp)fp.style.display='none';const mw=document.getElementById('manualWrap');if(mw)mw.style.display='none';processData();}}catch(e){}\n  document.getElementById('processBtn').addEventListener('click', processData);\n  document.getElementById('processBtn').disabled=true;\n  document.getElementById('fileEvents').addEventListener('change', e=>{ if(e.target.files[0]) readFileInput(e.target.files[0],'events','evInfo'); });\n  document.getElementById('fileTickets').addEventListener('change', e=>{ if(e.target.files[0]) readFileInput(e.target.files[0],'tickets','tkInfo'); });\n\n  // drag&drop\n  [['dzEvents','events','evInfo'],['dzTickets','tickets','tkInfo']].forEach(([dz,slot,info])=>{\n    const el=document.getElementById(dz);\n    el.addEventListener('dragover', e=>{ e.preventDefault(); el.classList.add('drag'); });\n    el.addEventListener('dragleave', ()=>el.classList.remove('drag'));\n    el.addEventListener('drop', e=>{ e.preventDefault(); el.classList.remove('drag'); if(e.dataTransfer.files[0]) readFileInput(e.dataTransfer.files[0],slot,info); });\n  });\n\n  document.getElementById('debugToggle').addEventListener('click', ()=>{\n    const p=document.getElementById('debugPanel'); const hidden=p.classList.toggle('hidden');\n    document.getElementById('debugChevron').style.transform=hidden?'':'rotate(180deg)';\n  });\n  document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click', ()=>switchTab(b.dataset.tab)));\n\n  // ---- filtro de período ----\n  const fFrom=document.getElementById('fltFrom'), fTo=document.getElementById('fltTo');\n  function onFilterChange(){ FILTER.from=fFrom.value||null; FILTER.to=fTo.value||null; if(loaded) applyFilters(false); }\n  fFrom.addEventListener('change', onFilterChange);\n  fTo.addEventListener('change', onFilterChange);\n  document.getElementById('fltReset').addEventListener('click', ()=>{ if(loaded){ FILTER.from=null; FILTER.to=null; applyFilters(false); } });\n  document.querySelectorAll('.preset').forEach(b=>b.addEventListener('click', ()=>{\n    if(!loaded || !RANGE.max) return;\n    const days=+b.dataset.preset;\n    const d=new Date(RANGE.max+'T00:00:00'); d.setDate(d.getDate()-(days-1));\n    const iso=d.toISOString().slice(0,10);\n    FILTER.from = (RANGE.min && iso<RANGE.min)? RANGE.min : iso;\n    FILTER.to = RANGE.max;\n    applyFilters(false);\n  }));\n\n  // ---- fonte: pasta local ----\n  const folderPanel=document.getElementById('folderPanel');\n  const connectBtn=document.getElementById('connectFolderBtn');\n  const refreshBtn=document.getElementById('refreshFolderBtn');\n  const manualWrap=document.getElementById('manualWrap');\n  if(FSA_OK){\n    connectBtn.addEventListener('click', pickDirectory);\n    refreshBtn.addEventListener('click', refreshFromDir);\n    const openTabBtn=document.getElementById('openTabBtn');\n    const embedded = window.self !== window.top;\n    if(openTabBtn){\n      openTabBtn.addEventListener('click', ()=>window.open(location.href,'_blank'));\n      if(embedded){ openTabBtn.classList.remove('hidden'); }\n    }\n    try{\n      const stored=await idbGet('dirHandle');\n      if(stored){\n        dirHandle=stored; showRefreshUI();\n        const fi=document.getElementById('folderInfo');\n        if(fi) fi.innerHTML=`Pasta lembrada: <b class=\"text-white\">${stored.name}<\u002Fb>`;\n        const perm=await stored.queryPermission({mode:'read'});\n        if(perm==='granted'){ await refreshFromDir(); }\n        else { setStatus('idle','Pasta “'+stored.name+'” lembrada. Clique em “Atualizar da pasta” para carregar os dados.'); }\n      }\n    }catch(e){ /* ignore */ }\n  } else {\n    if(folderPanel) folderPanel.classList.add('hidden');\n    if(manualWrap){ manualWrap.open=true; const s=manualWrap.querySelector('summary'); if(s) s.classList.add('hidden'); }\n  }\n\n  if(!dirHandle) setStatus('idle', FSA_OK?'Conecte a pasta de dados para carregar tudo automaticamente.':'Carregue os dois arquivos e clique em “Processar Dados”.');\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
