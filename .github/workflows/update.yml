name: Atualizar Dashboard

on:
  push:
    paths:
      - '_events.csv'
      - '_tickets.csv'
      - 'Danone CAC - Painel.html'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gerar index.html (bundle + auto-load)
        run: python patch_bundle.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet \
            && echo "Nenhuma mudança." \
            || (git commit -m "build: regenera index.html $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)
